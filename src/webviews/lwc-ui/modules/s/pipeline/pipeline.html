<template>
    <div class="slds-scope blue-back" style="padding: 0.5rem;">
            <!-- Status icon styles moved to pipeline.css (LWC requires CSS in the component bundle) -->
    <lightning-card title={i18n.devOpsPipelineTitle}>
        <div slot="actions" class="slds-float_right">
            <div class="actions-row">
                <div style="display:flex;align-items:center;gap:0.5rem;">
                    <!-- Provider icon button for Git -->
                    <template if:true={gitProviderIconUrl}>
                        <button class="slds-button provider-button" title={connectedLabel} onclick={handleGitConnect}>
                            <img class={gitProviderIconClass} src={gitProviderIconUrl} alt="Git Provider" />
                        </button>
                    </template>
                    <!-- Provider icon button for Ticketing -->
                    <template if:true={ticketProviderIconUrl}>
                        <button class="slds-button provider-button slds-m-right_medium" title={ticketConnectedLabel} onclick={handleTicketConnect}>
                            <img class={ticketProviderIconClass} src={ticketProviderIconUrl} alt="Ticket Provider" />
                        </button>
                    </template>

                    <template if:true={gitAuthenticated}>
                        <div class="toggle-wrapper">
                            <lightning-input
                                type="toggle"
                                label={i18n.showFeatureBranches}
                                checked={displayFeatureBranches}
                                onchange={handleToggleFeatureBranches}
                            ></lightning-input>
                        </div>
                    </template>

                    <lightning-button-group>
                        <lightning-button-menu
                            alternative-text={i18n.pipelineConfig}
                            icon-name="utility:settings"
                            variant="border-filled"
                            menu-alignment="right"
                        >
                            <lightning-menu-item
                                value="pipelineSettings"
                                label={i18n.pipelineConfig}
                                icon-name="utility:settings"
                                onclick={handleShowPipelineConfig}
                            ></lightning-menu-item>
                            <lightning-menu-item
                                value="addOrg"
                                label={i18n.addConfigureOrg}
                                icon-name="utility:key"
                                onclick={configureAuth}
                            ></lightning-menu-item>
                        </lightning-button-menu>
                        <lightning-button-menu
                            alternative-text={i18n.deploymentPackages}
                            icon-name="utility:package_org"
                            variant="border-filled"
                            menu-alignment="right"
                        >
                            <lightning-menu-item
                                value="packageXml"
                                label={i18n.packageXml}
                                icon-name="utility:upload"
                                onclick={handleShowPackageXml}
                            ></lightning-menu-item>
                            <lightning-menu-item
                                value="noOverwrite"
                                label={i18n.noOverwrite}
                                icon-name="utility:ban"
                                onclick={handleShowNoOverwrite}
                            ></lightning-menu-item>
                            <lightning-menu-item
                                value="destructive"
                                label={i18n.destructiveChanges}
                                icon-name="utility:delete"
                                onclick={handleShowDestructiveChanges}
                            ></lightning-menu-item>
                        </lightning-button-menu>
                        <lightning-button
                            icon-name="utility:refresh"
                            title={i18n.refreshPipelineData}
                            onclick={handleRefresh}
                        ></lightning-button>
                    </lightning-button-group>
                </div>
            </div>
        </div>
        <template if:true={pipelineData}>
            <template if:true={pipelineData.orgs}>
                <template if:true={pipelineData.orgs.length}>
                    <div class="pipeline-container">
                        <template if:true={loading}>
                            <div class="slds-align_absolute-center slds-m-vertical_small">
                                <s-spinner alternative-text={i18n.loadingPipelineData} size="medium" variant="brand"></s-spinner>
                            </div>
                        </template>
                        <div style="position: relative;">
                            <template if:true={loading}>
                                <div class="pipeline-loading-overlay"></div>
                            </template>
                            <div class="mermaid"></div>
                        </div>
                        <template if:true={error}>
                            <pre class="mermaid-debug" style="color:#888;font-size:10px;max-height:100px;overflow:auto;"></pre>
                        </template>
                        <template if:true={hasWarnings}>
                            <div class="slds-box slds-theme_warning slds-m-top_small" style="font-size:13px;">
                                <div class="slds-text-title_caps slds-m-bottom_x-small">{i18n.warnings}</div>
                                <ul class="slds-list_dotted">
                                    <template for:each={warnings} for:item="warning">
                                        <li key={warning}>{warning}</li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </template>
                <template if:false={pipelineData.orgs.length}>
                    <div class="slds-align_absolute-center" style="flex-direction:column;display:flex;align-items:center;padding:2rem;">
                        <div class="slds-text-heading_medium slds-m-bottom_medium">{i18n.noPipelineConfigured}</div>
                        <div class="slds-m-bottom_medium">{i18n.noPipelineConfiguredDescription}</div>
                        <a class="slds-button slds-button_brand slds-m-bottom_medium" href="https://sfdx-hardis.cloudity.com/salesforce-ci-cd-home/" target="_blank">{i18n.configureDevOpsPipeline}</a>
                        <a href="https://sfdx-hardis.cloudity.com/salesforce-ci-cd-home/" target="_blank" style="display:block;max-width:600px;width:100%;margin:1.5rem 0;">
                            <img src="https://sfdx-hardis.cloudity.com/assets/images/devops-comparison.png" alt="DevOps Comparison" style="max-width:600px;width:100%;box-shadow:0 2px 8px #0001;border-radius:8px;" />
                        </a>
                        <div class="slds-m-bottom_medium slds-text-body_regular" style="max-width:600px;text-align:center;">{i18n.pipelineDevOpsComparison}</div>
                    </div>
                </template>
            </template>
        </template>
        <template if:false={pipelineData}>
            <p>{i18n.loadingPipelineData}</p>
        </template>
        <template if:true={error}>
            <p class="slds-text-color_error">{errorLoadingPipelineMsg}</p>
        </template>
    </lightning-card>

    <!-- Quick Development Actions Card - only show when pipeline data exists -->
    <template if:true={pipelineData}>
        <template if:true={pipelineData.orgs}>
            <template if:true={pipelineData.orgs.length}>
                <div class="pipeline-card-spacing">
                    <lightning-card hide-header="true">
                    <lightning-tabset class="pipeline-tabs">
                        <lightning-tab label={i18n.projectContributionWorkflow} value="workflow" icon-name="utility:trail" icon-assistive-text={i18n.projectContributionWorkflow}>
                            <div class="commands-grid">
                                <div class="command-card" onclick={handleNewUserStory}>
                                    <div class="command-header">
                                        <div class="command-icon-container new-story">
                                            <lightning-icon icon-name="utility:add" size="small" variant="inverse"></lightning-icon>
                                        </div>
                                        <h3 class="command-title">{i18n.newUserStory}</h3>
                                    </div>
                                    <p class="command-description">{i18n.newUserStoryDescription}</p>
                                </div>
                                <div class="command-card" onclick={handleOpenMetadataRetriever}>
                                    <div class="command-header">
                                        <div class="command-icon-container pull-action">
                                            <lightning-icon icon-name="utility:download" size="small" variant="inverse"></lightning-icon>
                                        </div>
                                        <h3 class="command-title">{i18n.commitChanges}</h3>
                                    </div>
                                    <p class="command-description">{i18n.commitChangesDescription}</p>
                                </div>
                                <div class="command-card" onclick={handleShowInstalledPackages}>
                                    <div class="command-header">
                                        <div class="command-icon-container package-action">
                                            <lightning-icon icon-name="utility:package" size="small" variant="inverse"></lightning-icon>
                                        </div>
                                        <h3 class="command-title">{i18n.managePackages}</h3>
                                    </div>
                                    <p class="command-description">{i18n.managePackagesDescription}</p>
                                </div>
                                <div class="command-card" onclick={handleSaveUserStory}>
                                    <div class="command-header">
                                        <div class="command-icon-container save-action">
                                            <lightning-icon icon-name="utility:upload" size="small" variant="inverse"></lightning-icon>
                                        </div>
                                        <h3 class="command-title">{i18n.savePublish}</h3>
                                    </div>
                                    <p class="command-description">{i18n.savePublishDescription}</p>
                                </div>
                                <div class={currentPrCardClasses} onclick={handleOpenCurrentPR}>
                                    <div class="command-header">
                                        <div class="command-icon-container pr-action" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                                            <lightning-icon icon-name="utility:topic2" size="small" variant="inverse"></lightning-icon>
                                        </div>
                                        <h3 class="command-title">{currentPRCardTitle}</h3>
                                    </div>
                                    <p class="command-description">{currentPRDescription}</p>
                                </div>
                            </div>
                        </lightning-tab>
                        <lightning-tab label={openPrTabLabel} value="prs" icon-name="utility:topic2" icon-assistive-text={openPrTabLabel}>
                                <template if:true={gitAuthenticated}>
                                    <lightning-datatable
                                        key-field="id"
                                        data={openPullRequests}
                                        column-widths-mode="auto"
                                        columns={prColumns}
                                        hide-checkbox-column
                                        onrowaction={handlePRRowAction}
                                    ></lightning-datatable>
                                    <template if:true={prButtonInfo}>
                                        <div class="slds-m-top_small slds-align_absolute-center">
                                            <lightning-button 
                                                icon-name="utility:share"
                                                variant="brand"
                                                label={prButtonInfo.label} 
                                                title={prButtonInfo.label} 
                                                onclick={openPrPage}
                                            ></lightning-button>
                                        </div>
                                    </template>
                                </template>
                                <template if:false={gitAuthenticated}>
                                    <div class="slds-m-around_small slds-grid slds-grid_align-center">
                                        <lightning-button
                                            icon-name={connectedIconName}
                                            variant={connectedVariant}
                                            label={connectedLabel}
                                            title={i18n.connectToGitProvider}
                                            onclick={handleGitConnect}
                                        ></lightning-button>
                                    </div>
                                </template>
                        </lightning-tab>
                    </lightning-tabset>
                    </lightning-card>
                </div>
            </template>
        </template>
    </template>
    </div>

    <!-- PR Modal -->
    <template if:true={showPRModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title={i18n.close} onclick={handleClosePRModal}>
                        <lightning-icon icon-name="utility:close" size="small" alternative-text={i18n.close}></lightning-icon>
                        <span class="slds-assistive-text">{i18n.close}</span>
                    </button>
                    <h2 id="modal-heading-01" class="slds-modal__title slds-hyphenate">
                        <template if:true={isSinglePRMode}>
                            <a href="#" onclick={handleOpenSinglePRUrl} style="color: inherit; text-decoration: underline;">{modalTitle}</a>
                        </template>
                        <template if:false={isSinglePRMode}>
                            {modalTitle}
                        </template>
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                    <lightning-tabset>
                        <template if:true={showPRTab}>
                            <lightning-tab label={modalPrsTabLabel} value="prs" icon-name="utility:topic2" icon-assistive-text={modalPrsTabLabel}>
                            <lightning-datatable
                                key-field="id"
                                data={modalPullRequests}
                                columns={modalPrColumns}
                                hide-checkbox-column
                                column-widths-mode="auto"
                            ></lightning-datatable>
                        </lightning-tab>
                        </template>
                        <lightning-tab label={modalTicketsTabLabel} value="tickets" icon-name="utility:link" icon-assistive-text={modalTicketsTabLabel}>
                            <template if:true={modalTickets.length}>
                                <lightning-datatable
                                    key-field="id"
                                    data={modalTickets}
                                    columns={computedModalTicketColumns}
                                    hide-checkbox-column
                                    column-widths-mode="auto"
                                ></lightning-datatable>
                            </template>
                            <template if:false={modalTickets.length}>
                                <div class="slds-align_absolute-center slds-p-around_medium">
                                    <p class="slds-text-color_weak">{i18n.noTicketsFoundInPrs}</p>
                                </div>
                            </template>
                        </lightning-tab>
                        <lightning-tab label={modalActionsTabLabel} value="actions" icon-name="utility:task" icon-assistive-text={modalActionsTabLabel}>
                            <template if:true={showAddActionButton}>
                                <div class="slds-m-bottom_small">
                                    <lightning-button
                                        variant="brand"
                                        label={i18n.addNewAction}
                                        icon-name="utility:add"
                                        onclick={handleAddNewAction}
                                    ></lightning-button>
                                </div>
                            </template>
                            <template if:true={modalActions.length}>
                                <lightning-datatable
                                    key-field="id"
                                    data={modalActions}
                                    columns={computedModalActionsColumns}
                                    hide-checkbox-column
                                    column-widths-mode="auto"
                                    onrowaction={handleActionRowClick}
                                ></lightning-datatable>
                            </template>
                            <template if:false={modalActions.length}>
                                <div class="slds-align_absolute-center slds-p-around_medium">
                                    <p class="slds-text-color_weak">{i18n.noActionsFoundInPrs}</p>
                                </div>
                            </template>
                        </lightning-tab>
                            <!-- Apex Tests Tab (only when enabled in .sfdx-hardis.yml) -->
                            <template if:true={showApexTestsTab}>
                                <lightning-tab label={modalApexTestsTabLabel} value="apexTests" icon-name="utility:bug" icon-assistive-text={modalApexTestsTabLabel}>
                                    <template if:true={canEditApexTestsInModal}>
                                        <template if:true={isApexTestsViewMode}>
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                                <div class="slds-text-body_small">
                                                    {apexTestsConfiguredForPrMsg}
                                                </div>
                                                <lightning-button
                                                    variant="neutral"
                                                    label={i18n.edit}
                                                    onclick={handleEditApexTests}
                                                ></lightning-button>
                                            </div>

                                            <template if:true={hasSelectedApexTests}>
                                                <lightning-datatable
                                                    key-field="id"
                                                    data={apexTestsSelectedRows}
                                                    columns={apexTestsSelectedColumns}
                                                    hide-checkbox-column
                                                    column-widths-mode="auto"
                                                ></lightning-datatable>
                                            </template>
                                            <template if:false={hasSelectedApexTests}>
                                                <div class="slds-text-color_weak">{i18n.noApexClassesConfigured}</div>
                                            </template>
                                        </template>

                                        <template if:true={isApexTestsEditMode}>
                                            <div class="slds-m-bottom_small slds-text-body_small">
                                                {i18n.selectApexTestClasses}
                                            </div>
                                            <s-apex-tests-select
                                                available-classes={availableApexTestClasses}
                                                value={deploymentApexTestClasses}
                                                translations={translations}
                                                onchange={handleApexTestsSelectChange}
                                            ></s-apex-tests-select>
                                            <div class="slds-m-top_small">
                                                <lightning-button
                                                    variant="brand"
                                                    label={i18n.save}
                                                    onclick={handleSaveApexTests}
                                                ></lightning-button>
                                                <lightning-button
                                                    class="slds-m-left_small"
                                                    variant="neutral"
                                                    label={i18n.cancel}
                                                    onclick={handleCancelApexTestsEdit}
                                                ></lightning-button>
                                            </div>
                                        </template>
                                    </template>
                                    <template if:false={canEditApexTestsInModal}>
                                        <div class="slds-text-body_regular slds-m-bottom_small">
                                            {readOnlyBranchModeMsg}
                                        </div>
                                        <template if:true={hasApexTestsByLineRows}>
                                            <lightning-datatable
                                                key-field="id"
                                                data={apexTestsByLineRows}
                                                columns={apexTestsByLineColumns}
                                                hide-checkbox-column
                                                column-widths-mode="auto"
                                            ></lightning-datatable>
                                        </template>
                                        <template if:false={hasApexTestsByLineRows}>
                                            <div class="slds-text-color_weak">{i18n.noApexTestsInBranch}</div>
                                        </template>
                                    </template>
                                </lightning-tab>
                            </template>
                    </lightning-tabset>
                </div>
                <footer class="slds-modal__footer" style="display: flex; justify-content: space-between;">
                    <div>
                        <template if:true={isSinglePRMode}>
                            <lightning-button 
                                variant="brand" 
                                label={singlePRViewButtonLabel} 
                                icon-name="utility:new_window"
                                onclick={handleOpenSinglePRUrl}
                            ></lightning-button>
                        </template>
                    </div>
                    <div>
                        <lightning-button variant="neutral" label={i18n.close} onclick={handleClosePRModal}></lightning-button>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Deployment Action Modal (nested) -->
    <template if:true={showDeploymentActionModal}>
        <s-deployment-action
            action={currentDeploymentAction}
            is-edit-mode={isDeploymentActionEditMode}
            apex-scripts={projectApexScripts}
            sfdmu-workspaces={projectSfdmuWorkspaces}
            schedulable-classes={projectSchedulableClasses}
            schedulable-classes-loading={schedulableClassesLoading}
            communities={projectCommunities}
            communities-loading={communitiesLoading}
            parent-translations={translations}
            onclose={handleCloseDeploymentActionModal}
            onedit={handleEditDeploymentAction}
            onloadschedulableclasses={handleLoadSchedulableClasses}
            onloadcommunities={handleLoadCommunities}
            onsave={handleSaveDeploymentAction}
        ></s-deployment-action>
    </template>
</template>
