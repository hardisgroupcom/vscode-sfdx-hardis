<template>
    <div class="slds-scope blue-back">
        <div class="monitoring-container">
            <!-- Header Section -->
            <div class="header-section">
                <div class="header-content">
                    <div class="header-icon-container teal">
                        <lightning-icon icon-name="utility:graph" size="medium" variant="inverse"></lightning-icon>
                    </div>
                    <div class="header-text">
                        <h1 class="header-title">{i18n.orgMonitoringWorkbench}</h1>
                        <p class="header-subtitle">{i18n.monitorOrgDescription}</p>
                    </div>
                    <div class="header-actions">
                        <lightning-button 
                            variant="neutral" 
                            label={i18n.refreshLabel} 
                            title={i18n.checkInstallationStatusAgain}
                            onclick={checkInstallationStatus}
                            icon-name="utility:refresh"
                            class="status-button"
                        ></lightning-button>
                    </div>
                </div>
            </div>

            <!-- Installation Status Section -->
            <div class="section">
                <template if:true={isInstalled}>
                    <!-- Installed State -->
                    <div class="status-card installed">
                        <div class="status-icon-container success">
                            <lightning-icon icon-name="utility:success" size="small" variant="inverse"></lightning-icon>
                        </div>
                        <div class="status-content">
                            <div class="status-header">
                                <div class="status-heading">
                                    <h3 class="status-title">{i18n.orgMonitoringIsInstalled}</h3>
                                    <p class="status-description">{i18n.orgMonitoringConfigActive}</p>
                                </div>
                                <div class="status-actions auth-actions">
                                    <lightning-button 
                                        variant="brand"
                                        label={i18n.reconfigureAuthentication} 
                                        title={i18n.reconfigureAuthTooltip}
                                        onclick={reconfigureMonitoringAuth}
                                        icon-name="utility:redo"
                                        class="status-button"
                                    ></lightning-button>
                                    <lightning-button 
                                        variant="neutral" 
                                        label={i18n.monitorAnotherOrg} 
                                        title={i18n.monitorAnotherOrgTooltip}
                                        onclick={configureAnotherOrg}
                                        icon-name="utility:adduser"
                                        class="status-button"
                                    ></lightning-button>
                                </div>
                            </div>
                            <template if:true={instanceUrl}>
                                <div class="instance-url-row">
                                    <span class="instance-url-label">{i18n.monitoredOrgLabel}</span>
                                    <lightning-button 
                                        variant="base"
                                        label={instanceUrl}
                                        icon-name="utility:new_window"
                                        icon-position="right"
                                        onclick={openInstanceUrl}
                                        class="instance-url-button"
                                    ></lightning-button>
                                </div>
                            </template>
                            <div class="status-actions package-actions">
                                <lightning-button 
                                    variant="brand" 
                                    label={i18n.skipItemsPackage} 
                                    title={i18n.skipItemsPackageTooltip}
                                    onclick={viewSkipItemsPackage}
                                    icon-name="utility:ban"
                                    class="status-button"
                                ></lightning-button>
                                <lightning-button 
                                    variant="outline-brand" 
                                    label={i18n.backupItemsPackage} 
                                    title={i18n.backupItemsPackageTooltip}
                                    onclick={viewBackupItemsPackage}
                                    icon-name="utility:save"
                                    class="status-button"
                                ></lightning-button>
                                <lightning-button 
                                    variant="outline-brand" 
                                    label={i18n.allOrgItemsPackage} 
                                    title={i18n.allOrgItemsPackageTooltip}
                                    onclick={viewAllOrgItemsPackage}
                                    icon-name="utility:package"
                                    class="status-button"
                                ></lightning-button>
                            </div>
                        </div>
                    </div>
                </template>

                <template if:false={isInstalled}>
                        <!-- Not Installed State -->
                        <template if:true={isCiCdRepo}>
                            <!-- CI/CD repo: informational card -->
                            <div class="status-card cicd">
                                <div class="status-icon-container info">
                                    <lightning-icon icon-name="utility:info" size="small" variant="inverse"></lightning-icon>
                                </div>
                                <div class="status-content">
                                    <h3 class="status-title">{i18n.orgMonitoringNotPresentCiCd}</h3>
                                    <p class="status-description">
                                        {i18n.orgMonitoringNotPresentCiCdDescription}
                                    </p>
                                    <template if:true={monitoringRepository}>
                                        <div class="status-actions">
                                            <lightning-button 
                                                variant="brand" 
                                                label={i18n.openMonitoringRepository} 
                                                title={i18n.openMonitoringRepositoryTooltip}
                                                onclick={openMonitoringRepository}
                                                icon-name="utility:new_window"
                                                class="status-button"
                                            ></lightning-button>
                                            <lightning-button 
                                                variant="neutral" 
                                                label={i18n.learnMore} 
                                                title={i18n.learnMoreTooltip}
                                                onclick={learnMore}
                                                icon-name="utility:info"
                                                class="status-button"
                                            ></lightning-button>
                                        </div>
                                    </template>
                                    <template if:false={monitoringRepository}>
                                        <div class="status-actions">
                                            <lightning-button 
                                                variant="neutral" 
                                                label={i18n.learnMore} 
                                                title={i18n.learnMoreTooltip}
                                                onclick={learnMore}
                                                icon-name="utility:info"
                                                class="status-button"
                                            ></lightning-button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template if:false={isCiCdRepo}>
                            <div class="status-card not-installed">
                                <div class="status-icon-container warning">
                                    <lightning-icon icon-name="utility:warning" size="small" variant="inverse"></lightning-icon>
                                </div>
                                <div class="status-content">
                                    <h3 class="status-title">{i18n.orgMonitoringNotInstalled}</h3>
                                    <p class="status-description">
                                        {i18n.orgMonitoringNotInstalledDescription}
                                    </p>
                                    <div class="status-actions">
                                        <lightning-button 
                                            variant="brand" 
                                            label={i18n.installOrgMonitoring} 
                                            title={i18n.installOrgMonitoringTooltip}
                                            onclick={installOrgMonitoring}
                                            icon-name="utility:download"
                                            class="status-button primary"
                                        ></lightning-button>
                                        <lightning-button 
                                            variant="neutral" 
                                            label={i18n.learnMore} 
                                            title={i18n.learnMoreTooltip}
                                            onclick={learnMore}
                                            icon-name="utility:info"
                                            class="status-button"
                                        ></lightning-button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </template>
            </div>

            <!-- Monitoring Commands Section -->
            <div class="section">
                <div class="commands-grid">
                    <!-- Backup and Monitoring -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container backup">
                                <lightning-icon icon-name="utility:save" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.metadataBackup}</h3>
                        </div>
                        <p class="command-description">{i18n.metadataBackupDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.runBackup} 
                            onclick={runMetadataBackup}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Apex and Flow Errors -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container alerts">
                                <lightning-icon icon-name="utility:error" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.apexAndFlowErrors}</h3>
                        </div>
                        <p class="command-description">{i18n.apexAndFlowErrorsDescription}</p>
                        <lightning-button
                            variant="outline-brand"
                            label={i18n.monitorErrors}
                            onclick={runApexAndFlowErrors}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Audit Trail -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container audit">
                                <lightning-icon icon-name="utility:trail" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.auditTrailAnalysis}</h3>
                        </div>
                        <p class="command-description">{i18n.auditTrailAnalysisDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.analyzeAuditTrail} 
                            onclick={runAuditTrail}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Apex Tests -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container tests">
                                <lightning-icon icon-name="utility:apex" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.apexTests}</h3>
                        </div>
                        <p class="command-description">{i18n.apexTestsDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.runTests} 
                            onclick={runApexTests}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Org Limits -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container limits">
                                <lightning-icon icon-name="utility:graph" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.orgLimitsCheck}</h3>
                        </div>
                        <p class="command-description">{i18n.orgLimitsCheckDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.checkLimits} 
                            onclick={checkOrgLimits}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Health Check -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container health">
                                <lightning-icon icon-name="utility:check" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.securityHealthCheck}</h3>
                        </div>
                        <p class="command-description">{i18n.securityHealthCheckDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.runHealthCheck} 
                            onclick={runHealthCheck}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Release Updates -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container updates">
                                <lightning-icon icon-name="utility:new" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.releaseUpdates}</h3>
                        </div>
                        <p class="command-description">{i18n.releaseUpdatesDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.checkUpdates} 
                            onclick={checkReleaseUpdates}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Connected Apps Security -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container security">
                                <lightning-icon icon-name="utility:shield" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.connectedAppsSecurity}</h3>
                        </div>
                        <p class="command-description">{i18n.connectedAppsSecurityDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.checkSecurity} 
                            onclick={checkConnectedAppsSecurity}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Legacy API Usage -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container legacy">
                                <lightning-icon icon-name="utility:deprecate" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.legacyApiUsage}</h3>
                        </div>
                        <p class="command-description">{i18n.legacyApiUsageDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.checkApis} 
                            onclick={checkLegacyApi}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Apex API Version Check -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container legacy">
                                <lightning-icon icon-name="utility:apex" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.apexApiVersionCheck}</h3>
                        </div>
                        <p class="command-description">{i18n.apexApiVersionCheckDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.checkApexApiVersion} 
                            onclick={checkApexApiVersion}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Unused Users -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container users">
                                <lightning-icon icon-name="utility:user" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.unusedUsers}</h3>
                        </div>
                        <p class="command-description">{i18n.unusedUsersDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.findUsers}
                            onclick={findUnusedUsers}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Unused Licenses -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container licenses">
                                <lightning-icon icon-name="utility:key" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.unusedLicenses}</h3>
                        </div>
                        <p class="command-description">{i18n.unusedLicensesDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.checkLicenses}
                            onclick={checkUnusedLicenses}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Underused Permission Sets -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container licenses">
                                <lightning-icon icon-name="utility:lock" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.underusedPermissionSets}</h3>
                        </div>
                        <p class="command-description">{i18n.underusedPermissionSetsDescription}</p>
                        <lightning-button
                            variant="outline-brand"
                            label={i18n.findPermissionSets}
                            onclick={findUnderusedPermissionSets}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Minimal Permission Sets -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container licenses">
                                <lightning-icon icon-name="utility:shield" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.minimalPermSets}</h3>
                        </div>
                        <p class="command-description">{i18n.minimalPermSetsDescription}</p>
                        <lightning-button
                            variant="outline-brand"
                            label={i18n.findMinimalPermSets}
                            onclick={findMinimalPermSets}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Unused Apex Classes -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container apex">
                                <lightning-icon icon-name="utility:apex" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.unusedApexClasses}</h3>
                        </div>
                        <p class="command-description">{i18n.unusedApexClassesDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.findClasses} 
                            onclick={findUnusedApexClasses}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Unused Connected Apps -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container connected-apps">
                                <lightning-icon icon-name="utility:connected_apps" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.unusedConnectedApps}</h3>
                        </div>
                        <p class="command-description">{i18n.unusedConnectedAppsDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.findApps} 
                            onclick={findUnusedConnectedApps}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Metadata Access Check -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container metadata-access">
                                <lightning-icon icon-name="utility:lock" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.metadataAccessCheck}</h3>
                        </div>
                        <p class="command-description">{i18n.metadataAccessCheckDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.checkAccess}
                            onclick={checkMetadataAccess}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Object Field Usage -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container metadata-access">
                                <lightning-icon icon-name="utility:table" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.objectFieldUsage}</h3>
                        </div>
                        <p class="command-description">{i18n.objectFieldUsageDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.analyzeFields}
                            onclick={runObjectFieldUsage}
                            class="command-button"
                        ></lightning-button>
                    </div>

                    <!-- Unused Metadata -->
                    <div class="command-card">
                        <div class="command-header">
                            <div class="command-icon-container unused-metadata">
                                <lightning-icon icon-name="utility:custom_apps" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="command-title">{i18n.unusedMetadatas}</h3>
                        </div>
                        <p class="command-description">{i18n.unusedMetadatasDescription}</p>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.findMetadata} 
                            onclick={findUnusedMetadata}
                            class="command-button"
                        ></lightning-button>
                    </div>
                </div>
            </div>

            <!-- Documentation Section -->
            <div class="docs-section">
                <div class="docs-content">
                    <div class="docs-header">
                        <span class="docs-icon">📚</span>
                        <h3 class="docs-title">{i18n.learnMore}</h3>
                    </div>
                    <p class="docs-text">
                        {i18n.learnMoreDocDescription}
                    </p>
                    <div class="docs-actions">
                        <lightning-button 
                            variant="neutral" 
                            label={i18n.monitoringDocumentation} 
                            icon-name="utility:new_window"
                            onclick={openMonitoringDocs}
                            class="docs-button"
                        ></lightning-button>
                        <lightning-button 
                            variant="neutral" 
                            label={i18n.setupGuide} 
                            icon-name="utility:setup"
                            onclick={openSetupGuide}
                            class="docs-button"
                        ></lightning-button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
