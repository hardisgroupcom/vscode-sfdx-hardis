<template>
    <div class="slds-scope blue-back">
        <div class="monitoring-container">
            <!-- Header Section -->
            <div class="header-section">
                <div class="header-content">
                    <div class="header-icon-container teal">
                        <lightning-icon icon-name="utility:graph" size="medium" variant="inverse"></lightning-icon>
                    </div>
                    <div class="header-text">
                        <h1 class="header-title">{i18n.orgMonitoringWorkbench}</h1>
                        <p class="header-subtitle">{i18n.monitorOrgDescription}</p>
                    </div>
                    <div class="header-actions">
                        <template if:true={showFilter}>
                            <lightning-input
                                type="search"
                                variant="label-hidden"
                                placeholder={i18n.filterMonitoringCommands}
                                value={filterText}
                                onchange={handleFilterChange}
                                oninput={handleFilterChange}
                                class="filter-input"
                            ></lightning-input>
                        </template>
                        <lightning-button
                            variant="neutral"
                            label={i18n.refreshLabel}
                            title={i18n.checkInstallationStatusAgain}
                            onclick={checkInstallationStatus}
                            icon-name="utility:refresh"
                            class="status-button"
                        ></lightning-button>
                    </div>
                </div>
            </div>

            <!-- Installation Status Section -->
            <div class="section">
                <template if:true={isInstalled}>
                    <!-- Installed State -->
                    <div class="status-card installed">
                        <div class="status-icon-container success">
                            <lightning-icon icon-name="utility:success" size="small" variant="inverse"></lightning-icon>
                        </div>
                        <div class="status-content">
                            <div class="status-header">
                                <div class="status-heading">
                                    <h3 class="status-title">{i18n.orgMonitoringIsInstalled}</h3>
                                    <p class="status-description">{i18n.orgMonitoringConfigActive}</p>
                                </div>
                                <div class="status-actions auth-actions">
                                    <lightning-button-group>
                                        <lightning-button
                                            label={i18n.editMonitoringConfig}
                                            variant="brand"
                                            icon-name="utility:settings"
                                            title={i18n.editMonitoringConfigTooltip}
                                            onclick={openMonitoringConfig}>
                                        </lightning-button>
                                        <lightning-button-menu
                                            label={i18n.packages}
                                            icon-name="utility:package"
                                            variant="border"
                                            alternative-text={i18n.packages}
                                            title={i18n.packages}
                                            menu-alignment="right"
                                            onselect={handlePackageMenuSelect}>
                                            <lightning-menu-item
                                                value="skip"
                                                label={i18n.skipItemsPackage}
                                                title={i18n.skipItemsPackageTooltip}
                                                prefix-icon-name="utility:ban">
                                            </lightning-menu-item>
                                            <lightning-menu-item
                                                value="backup"
                                                label={i18n.backupItemsPackage}
                                                title={i18n.backupItemsPackageTooltip}
                                                prefix-icon-name="utility:save">
                                            </lightning-menu-item>
                                            <lightning-menu-item
                                                value="all-org"
                                                label={i18n.allOrgItemsPackage}
                                                title={i18n.allOrgItemsPackageTooltip}
                                                prefix-icon-name="utility:package">
                                            </lightning-menu-item>
                                        </lightning-button-menu>
                                        <lightning-button-menu
                                            icon-name="utility:identity"
                                            variant="border"
                                            alternative-text={i18n.authentication}
                                            title={i18n.authentication}
                                            menu-alignment="right"
                                            onselect={handleAuthMenuSelect}>
                                            <lightning-menu-item
                                                value="reconfigure"
                                                label={i18n.reconfigureAuthentication}
                                                title={i18n.reconfigureAuthTooltip}
                                                prefix-icon-name="utility:setup">
                                            </lightning-menu-item>
                                            <lightning-menu-item
                                                value="anotherOrg"
                                                label={i18n.monitorAnotherOrg}
                                                title={i18n.monitorAnotherOrgTooltip}
                                                prefix-icon-name="utility:people">
                                            </lightning-menu-item>
                                        </lightning-button-menu>
                                    </lightning-button-group>
                                </div>
                            </div>
                            <template if:true={instanceUrl}>
                                <div class="instance-url-row">
                                    <span class="instance-url-label">{i18n.monitoredOrgLabel}</span>
                                    <lightning-button
                                        variant="base"
                                        label={instanceUrl}
                                        icon-name="utility:new_window"
                                        icon-position="right"
                                        onclick={openInstanceUrl}
                                        class="instance-url-button"
                                    ></lightning-button>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template if:false={isInstalled}>
                        <!-- Not Installed State -->
                        <template if:true={isCiCdRepo}>
                            <!-- CI/CD repo: informational card -->
                            <div class="status-card cicd">
                                <div class="status-icon-container info">
                                    <lightning-icon icon-name="utility:info" size="small" variant="inverse"></lightning-icon>
                                </div>
                                <div class="status-content">
                                    <h3 class="status-title">{i18n.orgMonitoringNotPresentCiCd}</h3>
                                    <p class="status-description">
                                        {i18n.orgMonitoringNotPresentCiCdDescription}
                                    </p>
                                    <template if:true={monitoringRepository}>
                                        <div class="status-actions">
                                            <lightning-button
                                                variant="brand"
                                                label={i18n.openMonitoringRepository}
                                                title={i18n.openMonitoringRepositoryTooltip}
                                                onclick={openMonitoringRepository}
                                                icon-name="utility:new_window"
                                                class="status-button"
                                            ></lightning-button>
                                            <lightning-button
                                                variant="neutral"
                                                label={i18n.learnMore}
                                                title={i18n.learnMoreTooltip}
                                                onclick={learnMore}
                                                icon-name="utility:info"
                                                class="status-button"
                                            ></lightning-button>
                                        </div>
                                    </template>
                                    <template if:false={monitoringRepository}>
                                        <div class="status-actions">
                                            <lightning-button
                                                variant="neutral"
                                                label={i18n.learnMore}
                                                title={i18n.learnMoreTooltip}
                                                onclick={learnMore}
                                                icon-name="utility:info"
                                                class="status-button"
                                            ></lightning-button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template if:false={isCiCdRepo}>
                            <div class="status-card not-installed">
                                <div class="status-icon-container warning">
                                    <lightning-icon icon-name="utility:warning" size="small" variant="inverse"></lightning-icon>
                                </div>
                                <div class="status-content">
                                    <h3 class="status-title">{i18n.orgMonitoringNotInstalled}</h3>
                                    <p class="status-description">
                                        {i18n.orgMonitoringNotInstalledDescription}
                                    </p>
                                    <div class="status-actions">
                                        <lightning-button
                                            variant="brand"
                                            label={i18n.installOrgMonitoring}
                                            title={i18n.installOrgMonitoringTooltip}
                                            onclick={installOrgMonitoring}
                                            icon-name="utility:download"
                                            class="status-button primary"
                                        ></lightning-button>
                                        <lightning-button
                                            variant="neutral"
                                            label={i18n.learnMore}
                                            title={i18n.learnMoreTooltip}
                                            onclick={learnMore}
                                            icon-name="utility:info"
                                            class="status-button"
                                        ></lightning-button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </template>
            </div>

            <!-- Monitoring Commands Section (catalog-driven, lazy-loaded) -->
            <template if:true={isCatalogLoading}>
                <div class="section">
                    <div class="slds-is-relative spinner-wrapper" style="height: 6rem;">
                        <s-spinner
                            alternative-text={i18n.loadingMonitoringConfig}
                            size="medium"
                            variant="brand">
                        </s-spinner>
                    </div>
                </div>
            </template>

            <template if:true={hasNoCatalog}>
                <div class="section">
                    <div class="status-card not-installed">
                        <div class="status-icon-container warning">
                            <lightning-icon icon-name="utility:warning" size="small" variant="inverse"></lightning-icon>
                        </div>
                        <div class="status-content">
                            <h3 class="status-title">{i18n.monitoringConfigCatalogUnavailable}</h3>
                        </div>
                    </div>
                </div>
            </template>

            <template if:true={hasNoFilterResults}>
                <div class="section">
                    <p class="section-subtitle">{i18n.noMonitoringCommandsMatchFilter}</p>
                </div>
            </template>

            <template for:each={filteredSections} for:item="section">
                <div key={section.key} class="section">
                    <div class="section-header">
                        <h2 class="section-title"><span class="section-icon">{section.emoji}</span>{section.title}</h2>
                        <p class="section-subtitle">{section.description}</p>
                    </div>
                    <div class="commands-grid">
                        <template for:each={section.rows} for:item="row">
                            <div key={row.key} class="command-card">
                                <div class="command-header">
                                    <div class={row.iconContainerClass}>
                                        <lightning-icon icon-name={row.iconName} size="small" variant="inverse"></lightning-icon>
                                    </div>
                                    <h3 class="command-title">{row.title}</h3>
                                </div>
                                <p class="command-description">{row.description}</p>
                                <lightning-button
                                    variant="outline-brand"
                                    label={i18n.runCommandLabel}
                                    icon-name="utility:play"
                                    data-command={row.command}
                                    onclick={handleRunCommand}
                                    class="command-button"
                                ></lightning-button>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Documentation Section -->
            <div class="docs-section">
                <div class="docs-content">
                    <div class="docs-header">
                        <span class="docs-icon">📚</span>
                        <h3 class="docs-title">{i18n.learnMore}</h3>
                    </div>
                    <p class="docs-text">
                        {i18n.learnMoreDocDescription}
                    </p>
                    <div class="docs-actions">
                        <lightning-button
                            variant="neutral"
                            label={i18n.monitoringDocumentation}
                            icon-name="utility:new_window"
                            onclick={openMonitoringDocs}
                            class="docs-button"
                        ></lightning-button>
                        <lightning-button
                            variant="neutral"
                            label={i18n.setupGuide}
                            icon-name="utility:setup"
                            onclick={openSetupGuide}
                            class="docs-button"
                        ></lightning-button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
