<template>
    <div class="slds-scope slds-theme_default blue-back">
        <div class="config-container">
            <!-- Header -->
            <div class="header-content">
                <div class="header-icon-container purple">
                    <lightning-icon icon-name="utility:settings" size="medium" variant="inverse"></lightning-icon>
                </div>
                <div class="header-text">
                    <h1 class="header-title">{i18n.documentationConfigTitle}</h1>
                    <p class="header-subtitle">{i18n.documentationConfigSubtitle}</p>
                </div>
            </div>

            <!-- Prompt Templates Section -->
            <div class="section">
                <h2 class="section-title">
                    <lightning-icon icon-name="utility:note" size="x-small" class="section-icon"></lightning-icon>
                    {i18n.promptTemplatesSection}
                </h2>
                <p class="section-description">{i18n.promptTemplatesSectionDesc}</p>

                <div class="commands-grid">
                    <div class="command-card">
                        <div class="command-icon-container prompts">
                            <lightning-icon icon-name="utility:edit" size="small" variant="inverse"></lightning-icon>
                        </div>
                        <div class="command-content">
                            <h3 class="command-title">{i18n.overridePromptTemplates}</h3>
                            <p class="command-description">{i18n.overridePromptTemplatesDesc}</p>
                            <template if:true={hasLocalPromptTemplates}>
                                <div class="command-options">
                                    <lightning-input
                                        type="checkbox"
                                        label={i18n.overwriteLocalTemplates}
                                        checked={overwriteLocalTemplates}
                                        onchange={handleOverwriteLocalTemplatesChange}
                                    ></lightning-input>
                                    <lightning-button
                                        variant="neutral"
                                        label={i18n.showLabel}
                                        onclick={handleShowPromptTemplates}
                                    ></lightning-button>
                                </div>
                            </template>
                        </div>
                        <div class="command-actions">
                            <lightning-button variant="brand" label={i18n.overrideLabel} onclick={handleOverridePrompts}></lightning-button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AI & Documentation Configuration Section -->
            <div class="section">
                <h2 class="section-title">
                    <lightning-icon icon-name="utility:magicwand" size="x-small" class="section-icon"></lightning-icon>
                    {i18n.aiDocConfigSection}
                </h2>
                <p class="section-description" lwc:inner-html={aiDocConfigSectionDescHtml}></p>

                <template if:true={configLoading}>
                    <div class="config-loading">
                        <s-spinner alternative-text={i18n.loadingConfiguration} size="small" variant="brand"></s-spinner>
                        <p>{i18n.loadingConfiguration}</p>
                    </div>
                </template>

                <template if:false={configLoading}>
                    <template for:each={configSections} for:item="sect">
                        <template if:true={sect.visible}>
                            <div key={sect.label} class="config-section">
                                <h3 class="config-section-title">{sect.label}</h3>
                                <template if:true={sect.description}>
                                    <p class="config-section-description">{sect.description}</p>
                                </template>
                                <div class="config-fields" class:compact-row={sect.isCompactRow}>
                                    <template for:each={sect.fields} for:item="field">
                                        <div key={field.key} class="config-field slds-m-bottom_medium" class:compact-field={sect.isCompactRow}>
                                            <template if:true={sect.showInlineDescriptions}>
                                                <!-- Inline descriptions for deployment section -->
                                                <template if:true={field.isBoolean}>
                                                    <lightning-input
                                                        type="checkbox"
                                                        label={field.title}
                                                        name={field.key}
                                                        checked={field.value}
                                                        onchange={handleConfigFieldChange}
                                                        data-key={field.key}
                                                    ></lightning-input>
                                                </template>
                                                <template if:true={field.isEnum}>
                                                    <lightning-combobox
                                                        label={field.title}
                                                        value={field.value}
                                                        options={field.options}
                                                        data-key={field.key}
                                                        onchange={handleConfigFieldChange}
                                                    ></lightning-combobox>
                                                </template>
                                                <template if:true={field.isText}>
                                                    <lightning-input
                                                        type="text"
                                                        label={field.title}
                                                        value={field.value}
                                                        data-key={field.key}
                                                        onchange={handleConfigFieldChange}
                                                    ></lightning-input>
                                                </template>
                                                <template if:true={field.isNumber}>
                                                    <lightning-input
                                                        type="number"
                                                        label={field.title}
                                                        value={field.value}
                                                        data-key={field.key}
                                                        onchange={handleConfigFieldChange}
                                                    ></lightning-input>
                                                </template>
                                                <template if:true={field.description}>
                                                    <p class="field-inline-description">{field.description}</p>
                                                </template>
                                            </template>
                                            <template if:false={sect.showInlineDescriptions}>
                                                <!-- Extension Settings style: Label with inline helptext -->
                                                <div class="slds-form-element">
                                                    <template if:true={field.isProviderSelect}>
                                                        <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                                                            <span>{field.title}</span>
                                                            <template if:true={field.description}>
                                                                <s-multiline-helptext content={field.description}></s-multiline-helptext>
                                                            </template>
                                                        </label>
                                                        <lightning-combobox
                                                            name={field.key}
                                                            value={field.value}
                                                            options={field.options}
                                                            onchange={handleProviderChange}
                                                            variant="label-hidden"
                                                        ></lightning-combobox>
                                                    </template>
                                                    <template if:true={field.isBoolean}>
                                                        <label class="slds-form-element__label" style="display:block;">
                                                            {field.title}
                                                            <template if:true={field.description}>
                                                                <s-multiline-helptext content={field.description}></s-multiline-helptext>
                                                            </template>
                                                        </label>
                                                        <lightning-input
                                                            type="toggle"
                                                            name={field.key}
                                                            checked={field.value}
                                                            onchange={handleConfigFieldChange}
                                                            data-key={field.key}
                                                            variant="label-hidden"
                                                        ></lightning-input>
                                                    </template>
                                                    <template if:true={field.isEnum}>
                                                        <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                                                            <span>{field.title}</span>
                                                            <template if:true={field.description}>
                                                                <s-multiline-helptext content={field.description}></s-multiline-helptext>
                                                            </template>
                                                        </label>
                                                        <lightning-combobox
                                                            name={field.key}
                                                            value={field.value}
                                                            options={field.options}
                                                            data-key={field.key}
                                                            onchange={handleConfigFieldChange}
                                                            variant="label-hidden"
                                                        ></lightning-combobox>
                                                    </template>
                                                    <template if:true={field.isText}>
                                                        <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                                                            <span>{field.title}</span>
                                                            <template if:true={field.description}>
                                                                <s-multiline-helptext content={field.description}></s-multiline-helptext>
                                                            </template>
                                                        </label>
                                                        <lightning-input
                                                            type="text"
                                                            name={field.key}
                                                            value={field.value}
                                                            placeholder={field.defaultValue}
                                                            data-key={field.key}
                                                            onchange={handleConfigFieldChange}
                                                            variant="label-hidden"
                                                        ></lightning-input>
                                                    </template>
                                                    <template if:true={field.isNumber}>
                                                        <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                                                            <span>{field.title}</span>
                                                            <template if:true={field.description}>
                                                                <s-multiline-helptext content={field.description}></s-multiline-helptext>
                                                            </template>
                                                        </label>
                                                        <lightning-input
                                                            type="number"
                                                            name={field.key}
                                                            value={field.value}
                                                            placeholder={field.defaultValue}
                                                            data-key={field.key}
                                                            onchange={handleConfigFieldChange}
                                                            variant="label-hidden"
                                                        ></lightning-input>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </template>
                </template>
            </div>
        </div>
    </div>
</template>
