<template>
    <div class="slds-scope slds-theme_default slds-p-around_medium blue-back">
    <lightning-card>
        <span slot="title" class="org-manager-card-title">
            <lightning-icon icon-name="utility:connected_apps" size="medium" variant="inverse" class="org-manager-title-icon"></lightning-icon>
            {i18n.salesforceOrgsManager}
        </span>
        <div slot="actions" class="slds-float_right">
            <lightning-button-group>
                <lightning-input type="toggle" label={i18n.viewAllOrgs} title={i18n.viewAllOrgs} checked={viewAll} onchange={handleViewAllToggle}></lightning-input>
                <span class="slds-m-left_x-small"></span>
                <lightning-button icon-name="utility:refresh" label={i18n.refreshLabel} title={i18n.refreshOrgsListTooltip} onclick={handleRefresh}></lightning-button>
                <span class="slds-m-left_x-small"></span>
                <lightning-button icon-name="utility:add" label={i18n.addOrg} title={i18n.connectToExistingOrgs} variant="brand" onclick={handleConnect}></lightning-button>
                <span class="slds-m-left_x-small"></span>
                <template if:true={hasRecommended}>
                    <lightning-button icon-name="utility:recycle_bin_full" label={i18n.removeRecommendedLabel} variant="destructive" title={i18n.removeRecommendedOrgsTooltip} onclick={handleRemoveRecommended}></lightning-button>
                </template>
                <span class="slds-m-left_x-small"></span>
                <template if:true={hasSelection}>
                    <lightning-button icon-name="utility:delete" label={i18n.forgetSelectedLabel} variant="destructive" title={i18n.forgetSelectedOrgsTooltip} onclick={handleForgetSelected}></lightning-button>
                </template>
            </lightning-button-group>
        </div>
        <div class="slds-m-around_medium">
            <template if:true={isInitialLoading}>
                <div class="slds-text-align_center slds-p-around_large slds-is-relative org-manager-initial-loading">
                    <lightning-spinner alternative-text={i18n.loadingSalesforceOrgsShort} size="medium"></lightning-spinner>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-large">{i18n.loadingSalesforceOrgsShort}</p>
                </div>
            </template>
            <template if:false={isInitialLoading}>
                <div class="slds-is-relative">
                    <template if:true={isLoading}>
                        <lightning-spinner alternative-text={i18n.loadingSalesforceOrgsShort} size="medium"></lightning-spinner>
                    </template>
                    <lightning-datatable
                        key-field="username"
                        data={orgs}
                        column-widths-mode="auto"
                        columns={columns}
                        draft-values={draftValues}
                        oncellchange={handleDraftValuesChange}
                        onsave={handleSaveAliases}
                        oncancel={handleCancelAliasChanges}
                        onrowaction={handleRowAction}
                        onrowselection={handleRowSelection}
                        selected-rows={selectedRowKeys}
                        hide-checkbox-column={hasAliasChanges}
                        class="slds-m-bottom_medium"
                    ></lightning-datatable>
                </div>
            </template>
            
            <!-- Validation errors display -->
            <template if:true={hasValidationErrors}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-top_medium" role="alert">
                    <div class="slds-notify__content">
                        <h2 class="slds-text-heading_small">{i18n.aliasValidationErrors}</h2>
                        <ul class="slds-list_dotted slds-m-top_small">
                            <template for:each={validationErrors} for:item="error">
                                <li key={error.username} class="slds-m-bottom_x-small">
                                    <strong>{error.username}</strong> (alias: "{error.alias}"): {error.error}
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
    </div>
</template>
