<template>
  <div class="slds-scope slds-card blue-back" data-theme={colorTheme} data-contrast={colorContrast}>
    <!-- Header -->
    <div class="slds-card__header slds-grid">
      <header class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__figure">
          <span class="slds-icon_container slds-icon-standard-file header-icon-container orange">
            <lightning-icon icon-name="standard:file" alternative-text={i18n.filesLabel} size="large"></lightning-icon>
          </span>
        </div>
        <div class="slds-media__body">
          <div class="slds-grid slds-grid_align-spread">
            <h2 class="slds-card__header-title">
              <span class="slds-text-heading_medium">{i18n.filesWorkbenchTitle}</span>
            </h2>
          </div>
          <p class="slds-text-body_small slds-line-height_reset">
            {i18n.filesWorkbenchDesc}
          </p>
        </div>
      </header>
      <div class="slds-no-flex">
        <lightning-button
          variant="brand"
          label={i18n.createWorkspaceLabel}
          title={i18n.createWorkspaceTooltip}
          icon-name="utility:add"
          onclick={handleCreateWorkspace}
        ></lightning-button>
      </div>
    </div>

    <!-- Loading State -->
    <template if:true={isLoading}>
      <div class="slds-card__body slds-card__body_inner">
        <div class="slds-text-align_center slds-p-around_large">
          <lightning-spinner alternative-text={i18n.loadingWorkspaces} size="medium"></lightning-spinner>
          <p class="slds-text-body_small slds-text-color_weak slds-m-top_small">{i18n.loadingWorkspaces}</p>
        </div>
      </div>
    </template>

    <!-- No Workspaces State -->
    <template if:false={isLoading}>
      <template if:false={hasWorkspaces}>
        <div class="slds-card__body slds-card__body_inner">
          <div class="slds-text-align_center slds-p-around_large">
            <lightning-icon icon-name="utility:file" size="large" class="slds-text-color_weak"></lightning-icon>
            <h3 class="slds-text-heading_medium slds-m-top_medium">{i18n.noWorkspacesFound}</h3>
            <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">
              {i18n.noWorkspacesFoundDesc}
            </p>
            <lightning-button
              variant="brand"
              label={i18n.createFirstWorkspace}
              class="slds-m-top_medium"
              onclick={handleCreateWorkspace}
            ></lightning-button>
          </div>
        </div>
      </template>
    </template>

    <!-- Workspaces List -->
    <template if:false={isLoading}>
      <template if:true={hasWorkspaces}>
        <div class="slds-card__body slds-card__body_inner">
          <!-- Two Column Layout -->
          <div class="slds-grid slds-gutters">
            <!-- Left Column: Workspaces List -->
            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3 slds-large-size_1-of-4 workspace-list-container">
              <lightning-card title={i18n.availableWorkspacesTitle}>
                <s-multiline-helptext slot="actions" content={i18n.availableWorkspacesHelp}></s-multiline-helptext>
                <div class="slds-card__body slds-card__body_inner">
                  <div class="workspace-list">
                    <template for:each={workspacesForDisplay} for:item="workspace">
                      <div 
                        key={workspace.path} 
                        class={workspace.cssClass}
                        data-path={workspace.path}
                        onclick={handleWorkspaceSelect}
                      >
                        <div class="slds-media slds-media_small">
                          <div class="slds-media__figure">
                            <lightning-icon icon-name={workspace.iconName} size="small"></lightning-icon>
                          </div>
                          <div class="slds-media__body">
                            <p class="slds-text-body_regular slds-truncate" title={workspace.label}>
                              <strong>{workspace.label}</strong>
                            </p>
                            <p class="slds-text-body_small slds-text-color_weak slds-truncate" title={workspace.name}>
                              {workspace.name}
                            </p>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </lightning-card>
            </div>

            <!-- Right Column: Selected Workspace Actions -->
            <div class="slds-col slds-size_1-of-2 slds-medium-size_2-of-3 slds-large-size_3-of-4">
              <template if:true={selectedWorkspace}>
                <lightning-card title={selectedWorkspace.label}>
                  <!-- Card Actions Slot -->
                  <div slot="actions">
                    <!-- Horizontal Buttons - Rendered only when showLargeActions is true -->
                    <template if:true={showLargeActions}>
                      <div class="slds-show_large slds-grid">
                        <lightning-button
                          variant="brand"
                          label={i18n.exportFilesLabel}
                          title={i18n.exportFilesTooltip}
                          icon-name="utility:download"
                          icon-position="left"
                          size="small"
                          onclick={handleExportFiles}
                        ></lightning-button>
                        <lightning-button
                          variant="brand"
                          label={i18n.importFilesLabel}
                          title={i18n.importFilesTooltip}
                          icon-name="utility:upload"
                          icon-position="left"
                          size="small"
                          onclick={handleImportFiles}
                        ></lightning-button>
                        <lightning-button
                          variant="neutral"
                          label={i18n.editWorkspaceTooltip}
                          title={i18n.editWorkspaceTooltip}
                          icon-name="utility:edit"
                          icon-position="left"
                          size="small"
                          data-path={selectedWorkspace.path}
                          onclick={handleEditWorkspace}
                        ></lightning-button>
                        <lightning-button
                          variant="destructive"
                          label={i18n.deleteWorkspaceTooltip}
                          title={i18n.deleteWorkspaceTooltip}
                          icon-name="utility:delete"
                          icon-position="left"
                          size="small"
                          data-path={selectedWorkspace.path}
                          onclick={handleDeleteWorkspace}
                        ></lightning-button>
                      </div>
                    </template>

                    <!-- Dropdown Menu - Rendered only when showLargeActions is false -->
                    <template if:false={showLargeActions}>
                      <div class="slds-hide_large">
                        <lightning-button-menu
                          alternative-text={i18n.workspaceActionsMenu}
                          menu-alignment="right"
                          variant="border-filled"
                          icon-name="utility:down"
                        >
                          <lightning-menu-item
                            value="export"
                            label={i18n.exportFilesMenu}
                            icon-name="utility:download"
                            onclick={handleExportFiles}
                          ></lightning-menu-item>
                          <lightning-menu-item
                            value="import"
                            label={i18n.importFilesMenu}
                            icon-name="utility:upload"
                            onclick={handleImportFiles}
                          ></lightning-menu-item>
                          <lightning-menu-item
                            value="edit"
                            label={i18n.editWorkspaceMenu}
                            icon-name="utility:edit"
                            onclick={handleEditWorkspace}
                          ></lightning-menu-item>
                          <lightning-menu-item
                            value="delete"
                            label={i18n.deleteWorkspaceMenu}
                            icon-name="utility:delete"
                            onclick={handleDeleteWorkspace}
                          ></lightning-menu-item>
                        </lightning-button-menu>
                      </div>
                    </template>
                  </div>

                  <!-- Workspace Info -->
                  <div class="slds-media slds-m-bottom_medium">
                    <div class="slds-media__figure">
                      <lightning-button-icon
                        icon-name="utility:open_folder"
                        variant="bare"
                        alternative-text={i18n.openFolderInExplorer}
                        title={i18n.clickToOpenFolder}
                        size="large"
                        onclick={handleOpenFolder}
                        class="slds-p-around_xx-small"
                      ></lightning-button-icon>
                    </div>
                    <div class="slds-media__body">
                      <template if:true={selectedWorkspace.description}>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">{selectedWorkspace.description}</p>
                      </template>
                      <p class="slds-text-body_small slds-text-color_weak">
                        <strong>{i18n.pathLabel}</strong> {selectedWorkspace.path}
                      </p>
                      <template if:true={selectedWorkspace.exportedFilesCount}>
                        <p class="slds-text-body_small slds-text-color_default exported-files-clickable" onclick={handleOpenFolder} title={i18n.clickToOpenFolder}>
                          <lightning-icon icon-name="utility:file" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                          <strong>{exportedFilesCountLabel}</strong>
                        </p>
                      </template>
                    </div>
                  </div>

                  <!-- Configuration Preview -->
                  <div class="slds-m-top_medium slds-m-bottom_medium slds-p-bottom_small">
                    <div class="slds-grid slds-grid_align-spread slds-m-bottom_x-small">
                      <h5 class="slds-text-heading_x-small">{i18n.configSummaryTitle}</h5>
                    </div>
                    <div class="slds-box slds-box_x-small slds-theme_shade slds-m-bottom_medium">
                      <dl class="slds-list_horizontal slds-wrap">
                        <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.workspaceNameField}>{i18n.workspaceNameField}:</dt>
                        <dd class="slds-item_detail slds-truncate" title={selectedWorkspace.name}>{selectedWorkspace.name}</dd>
                        <template if:true={selectedWorkspace.description}>
                          <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.descriptionField}>{i18n.descriptionField}:</dt>
                          <dd class="slds-item_detail slds-truncate" title={selectedWorkspace.description}>{selectedWorkspace.description}</dd>
                        </template>
                        <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.soqlQueryField}>{i18n.soqlQueryField}:</dt>
                        <dd class="slds-item_detail slds-truncate" title={selectedWorkspace.soqlQuery}>{selectedWorkspace.soqlQuery}</dd>
                        <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.fileTypesField}>{i18n.fileTypesField}:</dt>
                        <dd class="slds-item_detail slds-truncate">{selectedWorkspace.fileTypes}</dd>
                        <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.minFileSizeField}>{i18n.minFileSizeField}:</dt>
                        <dd class="slds-item_detail slds-truncate">{selectedWorkspace.fileSizeMin}</dd>
                        <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.folderFieldLabel}>{i18n.folderFieldLabel}:</dt>
                        <dd class="slds-item_detail slds-truncate">{selectedWorkspace.outputFolderNameField}</dd>
                        <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.fileNameFormatField}>{i18n.fileNameFormatField}:</dt>
                        <dd class="slds-item_detail slds-truncate">{selectedWorkspace.outputFileNameFormat}</dd>
                        <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.overwriteParentRecordsField}>{i18n.overwriteParentRecordsField}:</dt>
                        <dd class="slds-item_detail slds-truncate">{selectedWorkspace.overwriteParentRecords}</dd>
                        <dt class="slds-item_label slds-text-color_weak slds-truncate" title={i18n.overwriteFilesField}>{i18n.overwriteFilesField}:</dt>
                        <dd class="slds-item_detail slds-truncate">{selectedWorkspace.overwriteFiles}</dd>
                      </dl>
                    </div>
                  </div>
                </lightning-card>
              </template>
              <template if:false={selectedWorkspace}>
                <lightning-card title={i18n.workspaceActionsTitle}>
                  <div class="slds-text-align_center slds-p-around_large">
                    <lightning-icon icon-name="utility:touch_action" size="large" class="slds-text-color_weak"></lightning-icon>
                    <h3 class="slds-text-heading_medium slds-m-top_medium">{i18n.selectAWorkspace}</h3>
                    <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">
                      {i18n.selectWorkspaceDesc}
                    </p>
                  </div>
                </lightning-card>
              </template>
            </div>
          </div>
        </div>
      </template>
    </template>
  </div>

    <!-- Create/Edit Workspace Modal -->
    <template if:true={showCreateWorkspace}>
      <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
          <header class="slds-modal__header">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title={i18n.closeLabel} onclick={handleCancel}>
              <lightning-icon icon-name="utility:close" alternative-text={i18n.closeLabel} size="small"></lightning-icon>
              <span class="slds-assistive-text">{i18n.closeLabel}</span>
            </button>
            <h2 id="modal-heading-01" class="slds-modal__title slds-hyphenate">{modalTitle}</h2>
          </header>
          <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
            <!-- Basic Information -->
            <div class="slds-form-element slds-m-bottom_medium">
              <label class="slds-form-element__label" for="workspace-name">
                <abbr class="slds-required" title={i18n.requiredField}>* </abbr>{i18n.workspaceNameInputLabel}
                <s-multiline-helptext content={i18n.workspaceNameInputHelp}></s-multiline-helptext>
              </label>
              <div class="slds-form-element__control">
                <lightning-input
                  variant="label-hidden"
                  type="text"
                  name="workspace-name"
                  placeholder={i18n.workspaceNameInputPlaceholder}
                  value={newWorkspace.name}
                  onchange={handleNameChange}
                  required
                ></lightning-input>
              </div>
            </div>

            <div class="slds-form-element slds-m-bottom_medium">
              <label class="slds-form-element__label" for="workspace-label">
                <abbr class="slds-required" title={i18n.requiredField}>* </abbr>{i18n.displayLabelField}
                <s-multiline-helptext content={i18n.displayLabelHelp}></s-multiline-helptext>
              </label>
              <div class="slds-form-element__control">
                <lightning-input
                  variant="label-hidden"
                  type="text"
                  name="workspace-label"
                  placeholder={i18n.displayLabelPlaceholder}
                  value={newWorkspace.label}
                  onchange={handleLabelChange}
                  required
                ></lightning-input>
              </div>
            </div>

            <div class="slds-form-element slds-m-bottom_medium">
              <label class="slds-form-element__label" for="workspace-description">
                {i18n.descriptionFieldLabel}
                <s-multiline-helptext content={i18n.descriptionFieldHelp}></s-multiline-helptext>
              </label>
              <div class="slds-form-element__control">
                <lightning-textarea
                  variant="label-hidden"
                  name="workspace-description"
                  placeholder={i18n.descriptionFieldPlaceholder}
                  value={newWorkspace.description}
                  onchange={handleDescriptionChange}
                ></lightning-textarea>
              </div>
            </div>

            <!-- Configuration -->
            <div class="slds-form-element slds-m-bottom_medium">
              <label class="slds-form-element__label" for="soql-query">
                <abbr class="slds-required" title={i18n.requiredField}>* </abbr>{i18n.soqlQueryInputLabel}
                <s-multiline-helptext content={i18n.soqlQueryInputHelp}></s-multiline-helptext>
              </label>
              <div class="slds-form-element__control">
                <lightning-textarea
                  variant="label-hidden"
                  name="soql-query"
                  placeholder="SELECT Id,Name FROM Opportunity"
                  value={newWorkspace.soqlQuery}
                  onchange={handleSoqlQueryChange}
                  required
                ></lightning-textarea>
              </div>
            </div>

            <div class="slds-grid slds-gutters">
              <div class="slds-col slds-size_1-of-2">
                <div class="slds-form-element slds-m-bottom_medium">
                  <label class="slds-form-element__label" for="file-types">
                    {i18n.fileTypesInputLabel}
                    <s-multiline-helptext content={i18n.fileTypesInputHelp}></s-multiline-helptext>
                  </label>
                  <div class="slds-form-element__control">
                    <lightning-combobox
                      variant="label-hidden"
                      name="file-types"
                      value={newWorkspace.fileTypes}
                      options={fileTypesOptions}
                      onchange={handleFileTypesChange}
                    ></lightning-combobox>
                  </div>
                </div>
              </div>

              <div class="slds-col slds-size_1-of-2">
                <div class="slds-form-element slds-m-bottom_medium">
                  <label class="slds-form-element__label" for="file-size-min">
                    {i18n.minFileSizeInputLabel}
                    <s-multiline-helptext content={i18n.minFileSizeInputHelp}></s-multiline-helptext>
                  </label>
                  <div class="slds-form-element__control">
                    <lightning-input
                      variant="label-hidden"
                      type="number"
                      name="file-size-min"
                      placeholder="0"
                      min="0"
                      value={newWorkspace.fileSizeMin}
                      onchange={handleFileSizeMinChange}
                    ></lightning-input>
                  </div>
                </div>
              </div>
            </div>

            <div class="slds-grid slds-gutters">
              <div class="slds-col slds-size_1-of-2">
                <div class="slds-form-element slds-m-bottom_medium">
                  <label class="slds-form-element__label" for="folder-field">
                    {i18n.folderNameFieldLabel}
                    <s-multiline-helptext content={i18n.folderNameFieldHelp}></s-multiline-helptext>
                  </label>
                  <div class="slds-form-element__control">
                    <lightning-input
                      variant="label-hidden"
                      type="text"
                      name="folder-field"
                      placeholder="Name"
                      value={newWorkspace.outputFolderNameField}
                      onchange={handleOutputFolderNameFieldChange}
                    ></lightning-input>
                  </div>
                </div>
              </div>

              <div class="slds-col slds-size_1-of-2">
                <!-- Empty column for layout balance -->
              </div>
            </div>

            <div class="slds-form-element slds-m-bottom_medium">
              <label class="slds-form-element__label" for="file-name-format">
                {i18n.fileNameFormatLabel}
                <s-multiline-helptext content={i18n.fileNameFormatHelp}></s-multiline-helptext>
              </label>
              <div class="slds-form-element__control">
                <lightning-combobox
                  variant="label-hidden"
                  name="file-name-format"
                  value={newWorkspace.outputFileNameFormat}
                  options={fileNameFormatOptions}
                  onchange={handleOutputFileNameFormatChange}
                ></lightning-combobox>
              </div>
            </div>

            <!-- Overwrite Options -->
            <div class="slds-form-element slds-m-bottom_medium">
              <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <lightning-input
                  type="toggle"
                  name="overwrite-parent-records"
                  label={i18n.overwriteParentRecordsLabel}
                  checked={newWorkspace.overwriteParentRecords}
                  onchange={handleOverwriteParentRecordsChange}
                  class="slds-no-flex"
                ></lightning-input>
                <s-multiline-helptext content={i18n.overwriteParentRecordsHelp} class="slds-m-left_small"></s-multiline-helptext>
              </div>
            </div>

            <div class="slds-form-element slds-m-bottom_medium">
              <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <lightning-input
                  type="toggle"
                  name="overwrite-files"
                  label={i18n.overwriteExistingFilesLabel}
                  checked={newWorkspace.overwriteFiles}
                  onchange={handleOverwriteFilesChange}
                  class="slds-no-flex"
                ></lightning-input>
                <s-multiline-helptext content={i18n.overwriteExistingFilesHelp} class="slds-m-left_small"></s-multiline-helptext>
              </div>
            </div>
          </div>
          <footer class="slds-modal__footer">
            <lightning-button
              variant="neutral"
              label={i18n.cancelLabel}
              onclick={handleCancel}
            ></lightning-button>
            <lightning-button
              variant="brand"
              label={saveButtonLabel}
              disabled={saveButtonDisabled}
              onclick={handleSave}
            ></lightning-button>
          </footer>
        </div>
      </section>
      <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
