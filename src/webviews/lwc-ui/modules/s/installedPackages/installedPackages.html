<template>
    <div class="slds-scope slds-p-around_medium blue-back">
    <lightning-card title={i18n.installedPackagesTitle}>
        <div slot="actions" class="slds-float_right">
            <lightning-button-group>
                <lightning-button icon-name="utility:download" label={i18n.retrieveFromOrg} variant="brand" title={i18n.retrieveFromOrgTooltip} onclick={handleRetrieveFromOrg}></lightning-button>
                <span class="slds-m-left_x-small"></span>
                <lightning-button icon-name="utility:add" label={i18n.installNewPackage} variant="brand" title={i18n.installNewPackageTooltip} onclick={handleInstallNewPackage}></lightning-button>
                <span class="slds-m-left_x-small"></span>
                <lightning-button icon-name="utility:refresh" label={i18n.refreshLabel} title={i18n.refreshInstalledPackagesTooltip} onclick={handleRefresh}></lightning-button>
            </lightning-button-group>
        </div>
        <div class="slds-m-around_medium">
            <div class="slds-notify slds-notify_alert slds-theme_info slds-theme_alert-texture slds-m-bottom_small" role="alert">
                <lightning-icon icon-name="utility:info" alternative-text="Info" size="small" class="slds-m-right_small"></lightning-icon>
                <span>
                    <p lwc:inner-html={packagesDeploymentsInfoHtml}></p>
                    <p lwc:inner-html={packagesScratchOrgInfoHtml}></p>
                </span>
            </div>
            <lightning-datatable
                key-field="Id"
                data={packages}
                columns={columns}
                column-widths-mode="auto"
                draft-values={draftValues}
                onsave={handleSave}
                oncancel={handleCancel}
                oncellchange={handleDraftValuesChange}
                hide-checkbox-column
                class="slds-m-bottom_medium"
            ></lightning-datatable>
        </div>
    </lightning-card>
    </div>
</template>
