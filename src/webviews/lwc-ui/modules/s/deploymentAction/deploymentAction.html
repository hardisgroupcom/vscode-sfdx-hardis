<template>
  <div class="slds-scope slds-theme_default">
    <section
      role="dialog"
      tabindex="-1"
      aria-modal="true"
      aria-labelledby="deployment-action-modal-heading"
      class="slds-modal slds-fade-in-open slds-modal_large"
    >
      <div class="slds-modal__container">
        <header class="slds-modal__header">
          <button
            class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
            title={i18n.closeLabel}
            onclick={handleClose}
          >
            <lightning-icon
              icon-name="utility:close"
              size="small"
              alternative-text={i18n.closeLabel}
            ></lightning-icon>
            <span class="slds-assistive-text">{i18n.closeLabel}</span>
          </button>
          <h2
            id="deployment-action-modal-heading"
            class="slds-modal__title slds-hyphenate"
          >
            {modalTitle}
          </h2>
        </header>
        <div class="slds-modal__content slds-p-around_medium">
          <div class="slds-grid slds-wrap slds-gutters">
            <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
              <div class="slds-form-element">
                <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                  <span>
                    <abbr class="slds-required" title={i18n.requiredField}>*</abbr>
                    {i18n.actionLabelField}
                  </span>
                  <s-multiline-helptext content={i18n.actionLabelHelp} class="slds-icon-text-info"></s-multiline-helptext>
                </label>
                <lightning-input
                  value={displayedAction.label}
                  data-field="label"
                  onchange={handleFieldChange}
                  required={isEditMode}
                  disabled={isViewMode}
                  variant="label-hidden"
                ></lightning-input>
              </div>
            </div>

            <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
              <div class="slds-form-element">
                <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                  <span>
                    <abbr class="slds-required" title={i18n.requiredField}>*</abbr>
                    {i18n.actionTypeField}
                  </span>
                  <s-multiline-helptext content={i18n.actionTypeHelp} class="slds-icon-text-info"></s-multiline-helptext>
                </label>
                <lightning-combobox
                  value={displayedAction.type}
                  options={typeOptions}
                  onchange={handleTypeChange}
                  required={isEditMode}
                  disabled={isViewMode}
                  variant="label-hidden"
                ></lightning-combobox>
              </div>
            </div>

            <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
              <div class="slds-form-element">
                <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                  <span>
                    <abbr class="slds-required" title={i18n.requiredField}>*</abbr>
                    {i18n.actionWhenField}
                  </span>
                  <s-multiline-helptext content={i18n.actionWhenHelp} class="slds-icon-text-info"></s-multiline-helptext>
                </label>
                <lightning-combobox
                  value={displayedAction.when}
                  options={whenOptions}
                  data-field="when"
                  onchange={handleFieldChange}
                  required={isEditMode}
                  disabled={isViewMode}
                  variant="label-hidden"
                ></lightning-combobox>
              </div>
            </div>

            <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
              <div class="slds-form-element">
                <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                  <span>{i18n.executionContextsLabel}</span>
                  <s-multiline-helptext content={i18n.executionContextsHelp} class="slds-icon-text-info"></s-multiline-helptext>
                </label>
                <lightning-combobox
                  value={displayedAction.context}
                  options={contextOptions}
                  data-field="context"
                  onchange={handleFieldChange}
                  disabled={isViewMode}
                  variant="label-hidden"
                ></lightning-combobox>
              </div>
            </div>

            <!-- Type-specific fields -->
            <template if:true={showCommandField}>
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>
                      <abbr class="slds-required" title={i18n.requiredField}>*</abbr>
                      {i18n.commandField}
                    </span>
                    <s-multiline-helptext content={i18n.commandFieldHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <lightning-input
                    value={displayedAction.command}
                    data-field="command"
                    onchange={handleFieldChange}
                    required={isEditMode}
                    disabled={isViewMode}
                    variant="label-hidden"
                  ></lightning-input>
                </div>
              </div>
            </template>

            <template if:true={showApexScriptField}>
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>{i18n.apexScriptLabel}</span>
                    <s-multiline-helptext content={i18n.apexScriptHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <div style="display:flex;align-items:center;gap:0.5rem;">
                    <div style="flex:1;">
                      <lightning-combobox
                        value={displayedAction.parameters.apexScript}
                        options={apexScriptOptions}
                        data-field="parameters.apexScript"
                        onchange={handleFieldChange}
                        disabled={isViewMode}
                        variant="label-hidden"
                        placeholder={i18n.selectAnApexScript}
                      ></lightning-combobox>
                    </div>
                    <template if:true={hasApexScriptSelected}>
                      <lightning-button-icon
                        icon-name="utility:new_window"
                        alternative-text={i18n.openApexScript}
                        title={i18n.openApexScriptInVsCode}
                        onclick={handleOpenApexScript}
                      ></lightning-button-icon>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <template if:true={showSfdmuProjectField}>
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>{i18n.sfdmuProjectPath}</span>
                    <s-multiline-helptext content={i18n.sfdmuProjectHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <div style="display:flex;align-items:center;gap:0.5rem;">
                    <div style="flex:1;">
                      <lightning-combobox
                        value={displayedAction.parameters.sfdmuProject}
                        options={sfdmuWorkspaceOptions}
                        data-field="parameters.sfdmuProject"
                        onchange={handleFieldChange}
                        disabled={isViewMode}
                        variant="label-hidden"
                        placeholder={i18n.selectADataWorkspace}
                      ></lightning-combobox>
                    </div>
                    <template if:true={hasSfdmuProjectSelected}>
                      <lightning-button-icon
                        icon-name="utility:new_window"
                        alternative-text={i18n.openExportJson}
                        title={i18n.openExportJsonInVsCode}
                        onclick={handleOpenSfdmuExport}
                      ></lightning-button-icon>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <template if:true={showCommunityNameField}>
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>{i18n.communityNameLabel}</span>
                    <s-multiline-helptext content={i18n.communityNameHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <lightning-input
                    value={displayedAction.parameters.communityName}
                    data-field="parameters.communityName"
                    onchange={handleFieldChange}
                    disabled={isViewMode}
                    variant="label-hidden"
                  ></lightning-input>
                </div>
              </div>
            </template>

            <template if:true={showScheduleBatchClassNameField}>
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>
                      <abbr class="slds-required" title={i18n.requiredField}>*</abbr>
                      {i18n.scheduleBatchClassNameLabel}
                    </span>
                    <s-multiline-helptext content={i18n.scheduleBatchClassNameHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <lightning-combobox
                    value={displayedAction.parameters.className}
                    options={schedulableClassOptions}
                    data-field="parameters.className"
                    onchange={handleFieldChange}
                    required={isEditMode}
                    disabled={isSchedulableClassComboboxDisabled}
                    variant="label-hidden"
                    placeholder={i18n.scheduleBatchSelectClassPlaceholder}
                  ></lightning-combobox>
                </div>
              </div>
            </template>

            <template if:true={showScheduleBatchCronExpressionField}>
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>
                      <abbr class="slds-required" title={i18n.requiredField}>*</abbr>
                      {i18n.scheduleBatchCronExpressionLabel}
                    </span>
                    <s-multiline-helptext content={i18n.scheduleBatchCronExpressionHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <lightning-input
                    value={displayedAction.parameters.cronExpression}
                    data-field="parameters.cronExpression"
                    onchange={handleFieldChange}
                    required={isEditMode}
                    disabled={isViewMode}
                    variant="label-hidden"
                  ></lightning-input>
                  <div class="slds-form-element__help">
                    {i18n.scheduleBatchCronExpressionExample}
                    - <a href="https://crontab.guru/" target="_blank">{i18n.buildCronExpressionLink}</a>
                  </div>
                </div>
              </div>
            </template>

            <template if:true={showScheduleBatchJobNameField}>
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>{i18n.scheduleBatchJobNameLabel}</span>
                    <s-multiline-helptext content={i18n.scheduleBatchJobNameHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <lightning-input
                    value={displayedAction.parameters.jobName}
                    data-field="parameters.jobName"
                    onchange={handleFieldChange}
                    disabled={isViewMode}
                    variant="label-hidden"
                  ></lightning-input>
                </div>
              </div>
            </template>

            <template if:true={showInstructionsField}>
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>{i18n.instructionsLabel}</span>
                    <s-multiline-helptext content={i18n.instructionsHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <lightning-textarea
                    value={displayedAction.parameters.instructions}
                    data-field="parameters.instructions"
                    onchange={handleFieldChange}
                    disabled={isViewMode}
                    variant="label-hidden"
                    style="--slds-c-textarea-sizing-min-height: 200px;">
                  ></lightning-textarea>
                </div>
              </div>
            </template>

            <!-- Additional flags -->
            <template if:true={showSkipIfErrorField}>
              <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
                <div class="slds-form-element">
                  <div style="display:flex;align-items:center;gap:0.25rem;margin-bottom:0.25rem;">
                    <span class="slds-form-element__label">{i18n.skipIfDeploymentError}</span>
                    <s-multiline-helptext content={i18n.skipIfDeploymentErrorHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </div>
                  <lightning-input
                    type="toggle"
                    label={i18n.skipIfDeploymentError}
                    checked={displayedAction.skipIfError}
                    data-field="skipIfError"
                    onchange={handleCheckboxChange}
                    disabled={isViewMode}
                    variant="label-hidden"
                  ></lightning-input>
                </div>
              </div>
            </template>

            <template if:true={showAllowFailureField}>
              <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
                <div class="slds-form-element">
                  <div style="display:flex;align-items:center;gap:0.25rem;margin-bottom:0.25rem;">
                    <span class="slds-form-element__label">{i18n.allowFailureLabel}</span>
                    <s-multiline-helptext content={i18n.allowFailureHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </div>
                  <lightning-input
                    type="toggle"
                    label={i18n.allowActionFailureToggle}
                    checked={displayedAction.allowFailure}
                    data-field="allowFailure"
                    onchange={handleCheckboxChange}
                    disabled={isViewMode}
                    variant="label-hidden"
                  ></lightning-input>
                </div>
              </div>
            </template>

            <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
              <div class="slds-form-element">
                <div style="display:flex;align-items:center;gap:0.25rem;margin-bottom:0.25rem;">
                  <span class="slds-form-element__label">{i18n.runOnlyOnceByOrg}</span>
                  <s-multiline-helptext content={i18n.runOnlyOnceByOrgHelp} class="slds-icon-text-info"></s-multiline-helptext>
                </div>
                <lightning-input
                  type="toggle"
                  label={i18n.runOnlyOnceByOrg}
                  checked={displayedAction.runOnlyOnceByOrg}
                  data-field="runOnlyOnceByOrg"
                  onchange={handleCheckboxChange}
                  disabled={isViewMode}
                  variant="label-hidden"
                ></lightning-input>
              </div>
            </div>

            <!-- customUsername (optional) -->
            <template if:true={showCustomUsernameField}>
              <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
                <div class="slds-form-element">
                  <label class="slds-form-element__label" style="display:flex;align-items:center;gap:0.25rem;">
                    <span>{i18n.executeWithCustomUsername}</span>
                    <s-multiline-helptext content={i18n.executeWithCustomUsernameHelp} class="slds-icon-text-info"></s-multiline-helptext>
                  </label>
                  <lightning-input
                    value={displayedAction.customUsername}
                    data-field="customUsername"
                    onchange={handleFieldChange}
                    disabled={isViewMode}
                    variant="label-hidden"
                  ></lightning-input>
                </div>
              </div>
            </template>
          </div>
        </div>
        <footer class="slds-modal__footer">
          <template if:false={isEditMode}>
            <lightning-button
              variant="brand"
              label={i18n.editLabel}
              onclick={handleEdit}
            ></lightning-button>
            <lightning-button
              variant="neutral"
              label={i18n.closeLabel}
              onclick={handleClose}
            ></lightning-button>
          </template>
          <template if:true={isEditMode}>
            <lightning-button
              variant="neutral"
              label={i18n.cancelLabel}
              onclick={handleCancel}
            ></lightning-button>
            <lightning-button
              variant="brand"
              label={i18n.saveLabel}
              onclick={handleSave}
            ></lightning-button>
          </template>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </div>
</template>
