<template>
    <div class="slds-scope blue-back" data-theme={colorTheme} data-contrast={colorContrast}>
        <div class="welcome-container">
            <!-- Compact Hero Header Section -->
            <div class="hero-section compact">
                <div class="hero-content">
                    <div class="hero-header">
                        <span class="hero-icon">🚀</span>
                        <div class="hero-text">
                            <h1 class="hero-title">{i18n.welcomeTitle}</h1>
                            <p class="hero-subtitle">{i18n.welcomeSubtitle} <a href="https://www.cloudity.com/?ref=sfdxhardis" target="_blank">Cloudity</a> &amp; <a href="https://sfdx-hardis.cloudity.com/contributors/" target="_blank">friends</a></p>
                        </div>
                    </div>
                </div>
                <div class="hero-top-left">
                    <lightning-button
                        variant="neutral"
                        label={i18n.installDependencies}
                        icon-name="utility:settings"
                        onclick={navigateToSetup}
                        class="setup-button"
                        title={i18n.openSetup}
                    ></lightning-button>
                </div>
                <div class="hero-settings">
                    <div class="hero-settings-row">
                        <div class="lang-selector" title={i18n.langSelectTooltip}>
                            <button class="lang-flag-button" onclick={toggleLangDropdown}>
                                <img class="lang-flag-img" src={currentLangFlagSrc} alt="">
                            </button>
                            <template lwc:if={langDropdownOpen}>
                                <div class="lang-dropdown">
                                    <div class="lang-option" data-lang="auto" onclick={handleLangChange}>
                                        <img class="lang-flag-img" src={flagGlobeSrc} alt="">
                                        <span class="lang-option-label">{i18n.langVsCodeAuto}</span>
                                    </div>
                                    <div class="lang-option" data-lang="en" onclick={handleLangChange}>
                                        <img class="lang-flag-img" src={flagEnSrc} alt="">
                                        <span class="lang-option-label">{i18n.langEnglish}</span>
                                    </div>
                                    <div class="lang-option" data-lang="fr" onclick={handleLangChange}>
                                        <img class="lang-flag-img" src={flagFrSrc} alt="">
                                        <span class="lang-option-label">{i18n.langFrench}</span>
                                    </div>
                                    <div class="lang-option" data-lang="ja" onclick={handleLangChange}>
                                        <img class="lang-flag-img" src={flagJaSrc} alt="">
                                        <span class="lang-option-label">{i18n.langJapanese}</span>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <lightning-input
                            type="toggle"
                            label={i18n.showAtStartup}
                            name="showWelcomeAtStartup"
                            checked={showWelcomeAtStartup}
                            onchange={handleWelcomeSettingChange}
                            class="welcome-toggle"
                        ></lightning-input>
                    </div>
                </div>
                <div class="hero-bottom-right">
                    <lightning-button-group>
                        <lightning-button
                            label={i18n.autoTheme}
                            name="auto"
                            onclick={handleThemeChange}
                            class="theme-button"
                            data-theme="auto"
                            variant={themeVariants.auto}
                        ></lightning-button>
                        <lightning-button
                            label={i18n.lightTheme}
                            name="light"
                            onclick={handleThemeChange}
                            class="theme-button"
                            data-theme="light"
                            variant={themeVariants.light}
                        ></lightning-button>
                        <lightning-button
                            label={i18n.darkTheme}
                            name="dark"
                            onclick={handleThemeChange}
                            class="theme-button"
                            data-theme="dark"
                            variant={themeVariants.dark}
                        ></lightning-button>
                    </lightning-button-group>
                </div>
            </div>

            <!-- Main Content Section -->
            <div class="section">
                <div class="unified-grid">
                    <!-- Org Manager Card -->
                    <div class="feature-card" onclick={navigateToOrgsManager}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container blue">
                                <lightning-icon icon-name="utility:connected_apps" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.orgsManager}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.orgsManagerDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>

                    <!-- DevOps Pipeline Card -->
                    <div class="feature-card" onclick={navigateToPipeline}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container teal">
                                <lightning-icon icon-name="utility:flow" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.devOpsPipeline}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.devOpsPipelineDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>

                    <!-- Metadata Retriever Card -->
                    <div class="feature-card" onclick={navigateToMetadataRetriever}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container blue">
                                <lightning-icon icon-name="utility:download" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.metadataRetriever}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.metadataRetrieverDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>

                    <!-- Org Monitoring Card -->
                    <div class="feature-card" onclick={navigateToOrgMonitoring}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container teal">
                                <lightning-icon icon-name="utility:graph" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.orgMonitoring}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.orgMonitoringDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>

                    <!-- Data Workbench (SFDMU) Card -->
                    <div class="feature-card" onclick={navigateToDataWorkbench}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container purple">
                                <lightning-icon icon-name="utility:database" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.dataWorkbench}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.dataWorkbenchDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>

                    <!-- Files Workbench Card -->
                    <div class="feature-card" onclick={navigateToFilesWorkbench}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container orange">
                                <lightning-icon icon-name="utility:file" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.filesWorkbench}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.filesWorkbenchDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>

                    <!-- Documentation Workbench Card -->
                    <div class="feature-card" onclick={navigateToDocumentationWorkbench}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container yellow">
                                <lightning-icon icon-name="utility:knowledge_base" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.documentationWorkbench}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.documentationWorkbenchDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>

                    <!-- Run Anonymous Apex Card -->
                    <div class="feature-card" onclick={navigateToRunAnonymousApex}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container blue">
                                <lightning-icon icon-name="utility:apex" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.runAnonymousApex}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.runAnonymousApexDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>

                    <!-- Extension Settings Card -->
                    <div class="feature-card" onclick={navigateToExtensionConfig}>
                        <div class="feature-card-header">
                            <div class="feature-icon-container gray">
                                <lightning-icon icon-name="utility:settings" size="medium" variant="inverse"></lightning-icon>
                            </div>
                            <h3 class="feature-title">{i18n.extensionSettings}</h3>
                        </div>
                        <p class="feature-description">
                            {i18n.extensionConfigDescription}
                        </p>
                        <div class="feature-arrow">→</div>
                    </div>
                </div>
            </div>

            <!-- Getting Started Section -->
            <div class="getting-started-section">
                <div class="getting-started-content">
                    <div class="getting-started-header">
                        <div class="getting-started-icon-container icon-container blue">
                            <lightning-icon icon-name="utility:education" size="medium" variant="inverse" class="getting-started-icon"></lightning-icon>
                        </div>
                        <div class="getting-started-text-header">
                            <h3 class="getting-started-title">{i18n.gettingStarted}</h3>
                            <p class="getting-started-subtitle">{i18n.gettingStartedSubtitle}</p>
                        </div>
                    </div>
                    <div class="getting-started-description">
                        <p class="getting-started-text">
                            {i18n.gettingStartedDescription}
                        </p>
                    </div>
                    <div class="getting-started-actions">
                        <lightning-button 
                            variant="brand" 
                            label={i18n.selectAnOrg}
                            icon-name="utility:connected_apps"
                            onclick={handleConnectToOrg}
                            class="slds-m-right_small"
                        ></lightning-button>
                        <lightning-button 
                            variant="outline-brand" 
                            label={i18n.viewDocumentation}
                            icon-name="utility:knowledge_base"
                            onclick={openDocumentation}
                        ></lightning-button>
                    </div>
                </div>
            </div>

            <!-- Open Source & Services Section -->
            <div class="open-source-section">
                <div class="open-source-content">
                    <div class="open-source-header">
                        <div class="open-source-icon-container icon-container teal">
                            <lightning-icon icon-name="utility:heart" size="medium" variant="inverse" class="open-source-icon"></lightning-icon>
                        </div>
                        <div class="open-source-text-header">
                            <h3 class="open-source-title">{i18n.openSourceAndFree}</h3>
                            <p class="open-source-subtitle">{i18n.openSourceSubtitle}</p>
                        </div>
                    </div>
                    <div class="open-source-description">
                        <div class="open-source-highlight">
                            <lightning-icon icon-name="utility:check" size="small" class="check-icon"></lightning-icon>
                            <span class="highlight-text">{i18n.openSourceFull}</span>
                        </div>
                        <div class="open-source-highlight">
                            <lightning-icon icon-name="utility:check" size="small" class="check-icon"></lightning-icon>
                            <span class="highlight-text">{i18n.completelyFree}</span>
                        </div>
                        <div class="open-source-highlight">
                            <lightning-icon icon-name="utility:check" size="small" class="check-icon"></lightning-icon>
                            <span class="highlight-text">{i18n.commercialUseAllowed}</span>
                        </div>
                    </div>
                    <div class="services-info">
                        <div class="services-card">
                            <div class="services-card-header">
                                <lightning-icon icon-name="utility:groups" size="small" class="services-icon"></lightning-icon>
                                <h4 class="services-card-title">{i18n.needExpertGuidance}</h4>
                            </div>
                            <p class="services-card-text">
                                <a href="https://www.cloudity.com/?ref=sfdxhardis" target="_blank" class="cloudity-link"><strong>Cloudity</strong></a> {i18n.cloudityServicesDescription}
                            </p>
                            <div class="services-card-actions">
                                <lightning-button 
                                    variant="brand" 
                                    label={i18n.contactUs}
                                    icon-name="utility:world"
                                    onclick={openCloudityServices}
                                ></lightning-button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
