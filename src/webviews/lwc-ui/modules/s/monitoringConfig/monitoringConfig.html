<template>
    <div class="slds-scope blue-back">
        <div class="monitoring-config-container">
            <!-- Header -->
            <div class="header-section">
                <div class="header-content">
                    <div class="header-icon-container teal">
                        <lightning-icon icon-name="utility:settings" size="medium" variant="inverse"></lightning-icon>
                    </div>
                    <div class="header-text">
                        <h1 class="header-title">{i18n.monitoringConfigWorkbench}</h1>
                        <p class="header-subtitle">{i18n.monitoringConfigDescription}</p>
                    </div>
                    <div class="header-actions">
                        <lightning-button
                            variant="neutral"
                            label={i18n.documentation}
                            onclick={handleOpenDocs}
                            icon-name="utility:help">
                        </lightning-button>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_medium">
                <div class="toolbar-left slds-grid slds-grid_vertical-align-end">
                    <template if:true={hasBranches}>
                        <div class="slds-form-element slds-m-right_small toolbar-branch">
                            <label class="slds-form-element__label">{i18n.copyFromBranch}</label>
                            <lightning-combobox
                                name="copyFromBranch"
                                variant="label-hidden"
                                value={copyFromBranch}
                                placeholder={i18n.selectBranch}
                                options={branchOptions}
                                onchange={handleCopyBranchChange}>
                            </lightning-combobox>
                        </div>
                        <lightning-button
                            variant="neutral"
                            label={i18n.applyCopy}
                            disabled={copyDisabled}
                            onclick={handleApplyCopy}
                            icon-name="utility:copy"
                            class="slds-m-right_small">
                        </lightning-button>
                    </template>
                    <lightning-button
                        variant="neutral"
                        label={i18n.addCustomCommand}
                        onclick={handleOpenCustomForm}
                        icon-name="utility:add">
                    </lightning-button>
                </div>
                <div class="toolbar-right">
                    <template if:true={dirty}>
                        <span class="slds-text-color_weak slds-m-right_small">{i18n.unsavedChanges}</span>
                    </template>
                    <lightning-button
                        variant="brand"
                        label={i18n.saveLabel}
                        onclick={handleSaveAll}
                        icon-name="utility:save">
                    </lightning-button>
                </div>
            </div>

            <!-- Add Custom Command form -->
            <template if:true={customFormOpen}>
                <div class="custom-form slds-box slds-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_small">{i18n.addCustomCommand}</h3>
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-4">
                            <lightning-input
                                label={i18n.customCommandKey}
                                data-field="key"
                                value={customRowDraft.key}
                                onchange={handleCustomFieldChange}
                                required>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-4">
                            <lightning-input
                                label={i18n.customCommandTitle}
                                data-field="title"
                                value={customRowDraft.title}
                                onchange={handleCustomFieldChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_2-of-4">
                            <lightning-input
                                label={i18n.customCommandCommand}
                                placeholder="sf hardis:org:..."
                                data-field="command"
                                value={customRowDraft.command}
                                onchange={handleCustomFieldChange}
                                required>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-4 slds-m-top_small">
                            <lightning-combobox
                                label={i18n.frequencyLabel}
                                data-field="frequency"
                                value={customRowDraft.frequency}
                                options={customFormFrequencyOptions}
                                onchange={handleCustomFieldChange}>
                            </lightning-combobox>
                        </div>
                    </div>
                    <div class="slds-m-top_medium slds-text-align_right">
                        <lightning-button
                            variant="neutral"
                            label={i18n.cancelLabel}
                            onclick={handleCustomFormCancel}
                            class="slds-m-right_small">
                        </lightning-button>
                        <lightning-button
                            variant="brand"
                            label={i18n.addLabel}
                            disabled={customFormSaveDisabled}
                            onclick={handleCustomFormSave}>
                        </lightning-button>
                    </div>
                </div>
            </template>

            <!-- Main table -->
            <div class="monitoring-table slds-table_container">
                <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th class="col-command" scope="col"><div class="slds-truncate" title="Command">{i18n.commandColumn}</div></th>
                            <th class="col-frequency" scope="col"><div class="slds-truncate" title="Frequency">{i18n.frequencyLabel}</div></th>
                            <th class="col-threshold" scope="col"><div class="slds-truncate" title="Messaging">{i18n.channelMessaging}</div></th>
                            <th class="col-threshold" scope="col"><div class="slds-truncate" title="Email">{i18n.channelEmail}</div></th>
                            <th class="col-threshold" scope="col"><div class="slds-truncate" title="API">{i18n.channelApi}</div></th>
                            <th class="col-actions" scope="col"><div class="slds-truncate" title="Actions">{i18n.actionsLabel}</div></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={rows} for:item="row">
                            <tr key={row.key} class="slds-hint-parent">
                                <td data-label="Command" class="cell-command">
                                    <div class="row-title">
                                        <strong>{row.title}</strong>
                                        <template if:true={row.isCustom}>
                                            <span class="slds-badge slds-badge_lightest slds-m-left_x-small">{i18n.customBadge}</span>
                                        </template>
                                    </div>
                                    <template if:true={row.description}>
                                        <div class="row-description slds-text-body_small slds-text-color_weak">{row.description}</div>
                                    </template>
                                    <template if:true={row.commandDisplay}>
                                        <div class="row-command slds-text-body_small slds-text-color_weak">
                                            <code>{row.commandDisplay}</code>
                                        </div>
                                    </template>
                                </td>
                                <td data-label="Frequency" class="cell-select">
                                    <lightning-combobox
                                        variant="label-hidden"
                                        data-key={row.key}
                                        value={row.frequencyValue}
                                        options={row.frequencyOptions}
                                        onchange={handleFrequencyChange}>
                                    </lightning-combobox>
                                </td>
                                <td data-label="Messaging" class="cell-select">
                                    <lightning-combobox
                                        variant="label-hidden"
                                        data-key={row.key}
                                        value={row.messagingValue}
                                        options={row.messagingOptions}
                                        onchange={handleMessagingChange}>
                                    </lightning-combobox>
                                </td>
                                <td data-label="Email" class="cell-select">
                                    <lightning-combobox
                                        variant="label-hidden"
                                        data-key={row.key}
                                        value={row.emailValue}
                                        options={row.emailOptions}
                                        onchange={handleEmailChange}>
                                    </lightning-combobox>
                                </td>
                                <td data-label="API" class="cell-select">
                                    <lightning-combobox
                                        variant="label-hidden"
                                        data-key={row.key}
                                        value={row.apiValue}
                                        options={row.apiOptions}
                                        onchange={handleApiChange}>
                                    </lightning-combobox>
                                </td>
                                <td data-label="Actions" class="cell-actions">
                                    <lightning-button-icon
                                        icon-name="utility:edit"
                                        alternative-text={i18n.detailsLabel}
                                        title={i18n.detailsLabel}
                                        data-key={row.key}
                                        onclick={handleOpenDetails}
                                        variant="bare">
                                    </lightning-button-icon>
                                    <template if:true={row.isCustom}>
                                        <lightning-button-icon
                                            icon-name="utility:delete"
                                            alternative-text={i18n.deleteLabel}
                                            title={i18n.deleteLabel}
                                            data-key={row.key}
                                            onclick={handleDeleteCustomRow}
                                            variant="bare"
                                            class="slds-m-left_x-small">
                                        </lightning-button-icon>
                                    </template>
                                    <template if:false={row.isCustom}>
                                        <template if:true={row.hasOverrides}>
                                            <lightning-button-icon
                                                icon-name="utility:undo"
                                                alternative-text={i18n.resetToDefault}
                                                title={i18n.resetToDefault}
                                                data-key={row.key}
                                                onclick={handleResetRow}
                                                variant="bare"
                                                class="slds-m-left_x-small">
                                            </lightning-button-icon>
                                        </template>
                                    </template>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Details modal -->
            <template if:true={modalOpen}>
                <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={handleModalCancel}>
                                <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                                <span class="slds-assistive-text">{i18n.closeLabel}</span>
                            </button>
                            <h2 class="slds-modal__title slds-hyphenate">{i18n.detailsLabel}: {modalEntry.title}</h2>
                        </header>
                        <div class="slds-modal__content slds-p-around_medium">
                            <div class="slds-form-element slds-m-bottom_small">
                                <lightning-combobox
                                    label={i18n.frequencyLabel}
                                    value={modalEntry.frequency}
                                    options={modalFrequencyOptions}
                                    onchange={handleModalFrequencyChange}>
                                </lightning-combobox>
                            </div>
                            <template if:true={modalIsWeekly}>
                                <div class="slds-form-element slds-m-bottom_small">
                                    <lightning-combobox
                                        label={i18n.frequencyDayLabel}
                                        value={modalEntry.frequencyDay}
                                        options={modalFrequencyDayOptions}
                                        onchange={handleModalFrequencyDayChange}>
                                    </lightning-combobox>
                                </div>
                            </template>
                            <template if:true={modalIsMonthly}>
                                <div class="slds-form-element slds-m-bottom_small">
                                    <lightning-input
                                        type="number"
                                        min="1"
                                        max="31"
                                        label={i18n.frequencyDayOfMonthLabel}
                                        value={modalEntry.frequencyDayOfMonth}
                                        onchange={handleModalDayOfMonthChange}>
                                    </lightning-input>
                                </div>
                            </template>
                            <div class="slds-form-element slds-m-bottom_small">
                                <lightning-textarea
                                    label={i18n.emailRecipientsLabel}
                                    placeholder={i18n.emailRecipientsPlaceholder}
                                    value={modalEmailRecipientsText}
                                    onchange={handleModalRecipientsChange}>
                                </lightning-textarea>
                                <p class="slds-form-element__help">{i18n.emailRecipientsHelp}</p>
                            </div>
                            <div class="slds-form-element slds-m-bottom_small">
                                <lightning-input
                                    type="checkbox"
                                    label={i18n.replaceRecipientsLabel}
                                    checked={modalReplaceRecipients}
                                    onchange={handleModalReplaceChange}>
                                </lightning-input>
                                <p class="slds-form-element__help">{i18n.replaceRecipientsHelp}</p>
                            </div>
                        </div>
                        <footer class="slds-modal__footer">
                            <lightning-button
                                variant="neutral"
                                label={i18n.cancelLabel}
                                onclick={handleModalCancel}
                                class="slds-m-right_small">
                            </lightning-button>
                            <lightning-button
                                variant="brand"
                                label={i18n.applyLabel}
                                onclick={handleModalSave}>
                            </lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>
        </div>
    </div>
</template>
