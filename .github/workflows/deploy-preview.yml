---
#
# Documentation:
# https://help.github.com/en/articles/workflow-syntax-for-github-actions
#

##################################################
# Start the job when a GitHub release is created #
##################################################
name: "Build & Deploy - PREVIEW"
on:
  push:
    branches: ["alpha"]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy on VsCode MarketPlace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          package-manager-cache: false
      - run: yarn --frozen-lockfile
      - name: Publish pre-release to Visual Studio Marketplace
        run: yarn vsce publish --pre-release -p "$VSCE_TOKEN" --allow-package-secrets github # zizmor: ignore[use-trusted-publishing]
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
