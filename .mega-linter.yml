# Configuration file for Mega-Linter
# See all available variables at https://megalinter.io/latest/config-file/ and in linters documentation

APPLY_FIXES: all # all, none, or list of linter keys
DEFAULT_BRANCH: main # Usually master or main
# ENABLE: # If you use ENABLE variable, all other languages/formats/tooling-formats will be disabled by default
# ENABLE_LINTERS: # If you use ENABLE_LINTERS variable, all other linters will be disabled by default
DISABLE:
  - CSS
  - HTML
DISABLE_LINTERS:
  - TYPESCRIPT_STANDARD
DISABLE_ERRORS_LINTERS:
  - JSON_V8R
  - SPELL_LYCHEE
  - YAML_YAMLLINT
JAVASCRIPT_DEFAULT_STYLE: prettier
TYPESCRIPT_DEFAULT_STYLE: prettier
FLAVOR_SUGGESTIONS: false
SECURITY_SUGGESTIONS: false
# Security scanners: point each tool at its repo-level ignore config so triaged,
# non-reachable findings (see .grype.yaml / osv-scanner.toml / .trivyignore) are suppressed with justification + expiry.
REPOSITORY_GRYPE_ARGUMENTS: "--config .grype.yaml"
REPOSITORY_OSV_SCANNER_ARGUMENTS: "--config=osv-scanner.toml"
REPOSITORY_TRIVY_ARGUMENTS: "--ignorefile .trivyignore --skip-dirs .megalinter_github_conf"
FILTER_REGEX_EXCLUDE: (\.vscode|\.claude)
MARKDOWN_MARKDOWN_LINK_CHECK_DISABLE_ERRORS: true
SHOW_ELAPSED_TIME: true
CONFIG_REPORTER: false
FILEIO_REPORTER: false
SECURED_ENV_VARIABLES:
  - VSCE_TOKEN
ACTION_ACTIONLINT_DISABLE_ERRORS_IF_LESS_THAN: 2
ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES:
  - GITHUB_TOKEN

# AI config
LLM_ADVISOR_ENABLED: true # Enable/disable AI advisor
LLM_ADVISOR_LEVEL: ERROR # When to trigger: ERROR (default) or WARNING
LLM_PROVIDER: google # Provider: see supported providers above
LLM_MODEL_NAME: gemini-2.5-flash-lite # Model name (provider-specific)

