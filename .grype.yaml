# Grype configuration for the SFDX Hardis VS Code extension.
# Fail the scan on findings at or above the "medium" severity threshold (MegaLinter default behavior).
fail-on-severity: medium
ignore:
  # GHSA-8988-4f7v-96qf / CVE-2026-54285 - @opentelemetry/core 1.30.1.
  # Pinned inside @vscode/extension-telemetry > applicationinsights (1.x SDK tree); no patched 1.x
  # release exists (fix is only 2.8.0) and the 2.x copies are already resolved to 2.8.0 via resolutions.
  # The CVE is unbounded memory allocation while PARSING an inbound W3C Baggage header; this extension
  # only EMITS outbound telemetry and never parses attacker-controlled baggage headers, so the path is
  # not reachable. Re-evaluate (~2026-09-18) when applicationinsights ships an OTel 2.x line.
  - vulnerability: GHSA-8988-4f7v-96qf
    package:
      name: "@opentelemetry/core"
      version: 1.30.1
